<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arcade Park - Nextbot Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: rgba(255,255,255,0.7);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; border: 1px solid black; mix-blend-mode: difference;
        }
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 30px; box-sizing: border-box; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .stats-container { display: flex; gap: 20px; pointer-events: auto; align-items: center; }
        .stats {
            background: rgba(0,0,0,0.7); color: #ffd700;
            padding: 10px 20px; border-radius: 30px;
            font-size: 18px; border: 2px solid #ffd700;
        }
        #stamina-container {
            width: 200px; height: 20px; background: rgba(0,0,0,0.5);
            border: 2px solid #fff; border-radius: 10px; overflow: hidden;
        }
        #stamina-bar {
            width: 100%; height: 100%; background: #00ff88;
            transition: width 0.1s linear;
        }
        #prompt {
            color: white; font-size: 24px; font-weight: bold;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 15px;
            display: none; border-bottom: 4px solid #ffd700;
        }
        #setup-screen, #end-screen {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        #end-screen { display: none; z-index: 101; color: white; }
        input, select { padding: 10px; font-size: 18px; border-radius: 5px; border: none; margin: 10px; width: 250px; }
        button { padding: 10px 20px; font-size: 20px; cursor: pointer; background: #ffd700; border: none; border-radius: 5px; font-weight: bold; margin: 5px; }
        #leaderboard {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8);
            padding: 15px; border-radius: 10px; border: 1px solid #ffd700; color: #fff; font-size: 14px;
        }
        #game-info {
            position: absolute; top: 100px; right: 20px;
            background: rgba(0,0,0,0.8); color: white; padding: 20px;
            border-radius: 15px; display: none; border: 2px solid #00ffff;
        }
        label { color: #ffd700; font-weight: bold; font-size: 16px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: #ffd700;">ARCADE PARK CHALLENGE</h1>
        
        <label>NOME DO JOGADOR:</label>
        <input type="text" id="player-name" placeholder="Nome do jogador..." maxlength="15">
        
        <label>QUANTIDADE DE NEXTBOTS (MÁX 15):</label>
        <input type="number" id="nb-count" value="5" min="1" max="15">
        
        <label>PRÊMIOS PARA VENCER (MÁX 20):</label>
        <input type="number" id="target-prizes" value="10" min="1" max="20">
        
        <label>DIFICULDADE (VELOCIDADE):</label>
        <select id="nb-difficulty">
            <option value="0.05">FÁCIL</option>
            <option value="0.12" selected>MÉDIO</option>
            <option value="0.18">DIFÍCIL</option>
            <option value="0.25">INSANO</option>
        </select>

        <button onclick="startGame()">INICIAR JOGO</button>
    </div>

    <div id="end-screen">
        <h1 style="color: #ffd700;">RODADA FINALIZADA!</h1>
        <p id="final-stats" style="font-size: 24px;"></p>
        <button onclick="location.reload()">JOGAR NOVAMENTE</button>
    </div>

    <div id="leaderboard">
        <strong style="color: #ffd700;">RANKING:</strong>
        <div id="score-list"></div>
    </div>

    <div id="crosshair"></div>
    <div id="ui-layer">
        <div class="stats-container">
            <div id="coin-display" class="stats">MOEDAS: <span id="coin-val">0</span></div>
            <div class="stats" style="color: #00ffcc; border-color: #00ffcc;">OBJETIVO: <span id="prizes-val">10</span></div>
            <div class="stats" style="color: #ff4444; border-color: #ff4444;">TEMPO: <span id="timer-val">0.0</span>s</div>
            
            <div style="display: flex; flex-direction: column; align-items: center;">
                <span style="font-size: 11px; font-weight: bold; color: white; margin-bottom: 2px;">ESTAMINA (SHIFT)</span>
                <div id="stamina-container">
                    <div id="stamina-bar"></div>
                </div>
            </div>

            <button onclick="location.reload()" style="background: #555; color: white; pointer-events: auto;">REINICIAR</button>
        </div>
        <div id="prompt">Pressione [E] para interagir</div>
    </div>

    <div id="game-info">
        <h2 style="color:#00ffff; margin-top:0">MODO GARRA</h2>
        <ul style="list-style:none; padding:0">
            <li>Setas: Mover | Espaço: Pescar | ESC: Sair</li>
        </ul>
    </div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const skyColor = 0x87CEEB;
    scene.background = new THREE.Color(skyColor);
    scene.fog = new THREE.Fog(skyColor, 10, 150);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const grassTexture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');
    grassTexture.wrapS = grassTexture.wrapT = THREE.RepeatWrapping;
    grassTexture.repeat.set(100, 100);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.rotation.order = 'YXZ';

    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(40, 60, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.bias = -0.0005;
    scene.add(sun);
    
    scene.add(new THREE.AmbientLight(0xffffff, 0.4)); 

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ map: grassTexture }));
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Árvores
    function createTree(x, z) {
        const group = new THREE.Group();
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 3), new THREE.MeshStandardMaterial({color: 0x4d2d18}));
        trunk.position.y = 1.5; trunk.castShadow = true;
        group.add(trunk);
        const f = new THREE.Mesh(new THREE.DodecahedronGeometry(1.8), new THREE.MeshStandardMaterial({color: 0x2d5a27}));
        f.position.y = 4; f.castShadow = true; group.add(f);
        group.position.set(x, 0, z);
        scene.add(group);
    }
    for(let i=0; i<40; i++) {
        let rx = Math.random()*180-90, rz = Math.random()*180-90;
        if(Math.abs(rx) > 15 || Math.abs(rz) > 15) createTree(rx, rz);
    }

    // Moedas
    const coins = [];
    for(let i=0; i<30; i++) {
        const c = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.05), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8 }));
        c.position.set(Math.random()*80-40, 0.3, Math.random()*80-40);
        c.rotation.x = Math.PI/2; c.castShadow = true; scene.add(c); coins.push(c);
    }

    // Parkour
    const platforms = []; const obstacles = [];
    const platMat = new THREE.MeshStandardMaterial({color: 0x555555, roughness: 0.8});
    for(let i=0; i<15; i++) {
        const angle = i * 0.5; const radius = 10 + (i * 0.4);
        const px = Math.cos(angle) * radius + 20; const pz = Math.sin(angle) * radius - 20; const py = 1 + (i * 1.0);
        const p = new THREE.Mesh(new THREE.BoxGeometry(4, 0.5, 4), platMat);
        p.position.set(px, py, pz); p.receiveShadow = true; p.castShadow = true; scene.add(p); platforms.push(p);
        if(i > 2 && i % 3 === 0) {
            const obs = new THREE.Mesh(new THREE.BoxGeometry(0.8, 4, 0.8), new THREE.MeshStandardMaterial({color: 0xff3333}));
            obs.position.set(px, py + 2.2, pz); obs.castShadow = true; scene.add(obs); obstacles.push(obs);
        }
    }

    // Baú da Sorte
    const chestGroup = new THREE.Group();
    const chestBox = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 0.8), new THREE.MeshStandardMaterial({color: 0x3d2b1f}));
    chestBox.castShadow = true; chestGroup.add(chestBox);
    chestGroup.position.set(platforms[14].position.x, platforms[14].position.y + 0.65, platforms[14].position.z);
    scene.add(chestGroup);

    // Mão
    const handGroup = new THREE.Group();
    const handMesh = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.25, 0.6), new THREE.MeshStandardMaterial({color: 0xffdbac}));
    handMesh.castShadow = true;
    handGroup.add(handMesh);
    handGroup.position.set(0.6, -0.6, -1); 
    camera.add(handGroup); scene.add(camera);

    // Máquina
    const machine = new THREE.Group();
    const mBase = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.5, 3.5), new THREE.MeshStandardMaterial({color: 0xaa0000, metalness: 0.5}));
    mBase.castShadow = true; machine.add(mBase);
    const mGlass = new THREE.Mesh(new THREE.BoxGeometry(3.4, 4, 3.4), new THREE.MeshPhysicalMaterial({color: 0xffffff, transmission: 0.9, transparent: true, opacity: 0.2}));
    mGlass.position.y = 2.75; machine.add(mGlass);
    machine.position.set(0, 0.75, -10); scene.add(machine);
    
    const prizesInside = [];
    for(let i=0; i<20; i++) {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff }));
        p.position.set((Math.random()-0.5)*2.5, 1.5, (Math.random()-0.5)*2.5);
        p.castShadow = true; p.visible = false; machine.add(p); prizesInside.push(p);
    }
    
    const clawSystem = new THREE.Group();
    const cable = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 4), new THREE.MeshStandardMaterial({color:0x222222})); cable.position.y = 2;
    const clawHead = new THREE.Group(); const pinchers = [];
    for(let i=0; i<3; i++) {
        const pPivot = new THREE.Group(); 
        const pMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.7, 0.1), new THREE.MeshStandardMaterial({color:0x888888}));
        pMesh.position.set(0, -0.35, 0.2); pPivot.add(pMesh); pPivot.rotation.y = (Math.PI*2/3)*i; clawHead.add(pPivot); pinchers.push(pPivot);
    }
    clawSystem.add(cable, clawHead); clawSystem.position.set(0, 5, 0); machine.add(clawSystem);

    // Nextbots
    const monsterTexture = new THREE.TextureLoader().load('https://i.postimg.cc/28t3863D/Captura-de-tela-2026-04-19-235654.png');
    const monsters = [];
    for(let i=0; i<15; i++) {
        const monster = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 3.5), new THREE.MeshBasicMaterial({ map: monsterTexture, side: THREE.DoubleSide, transparent: true }));
        monster.visible = false; scene.add(monster); monsters.push(monster);
    }

    // Variáveis
    let playerName = "", coinsCount = 0, prizesLeft = 10, gameState = "SETUP", isClawDescending = false, caughtPrize = null;
    let startTime = 0, gameActive = false, velocityY = 0, isGrounded = true;
    let moveF = false, moveB = false, moveL = false, moveR = false, isRunning = false;
    let yaw = 0, pitch = 0, clawOpen = 1, nbSpeed = 0.1, stamina = 100;
    const clawKeys = { left: false, right: false, up: false, down: false };

    window.startGame = () => {
        const nameInput = document.getElementById('player-name');
        if(nameInput.value.trim() === "") return alert("Digite seu nome!");
        playerName = nameInput.value;
        const nbCount = Math.min(15, parseInt(document.getElementById('nb-count').value) || 1);
        prizesLeft = Math.min(20, parseInt(document.getElementById('target-prizes').value) || 1);
        nbSpeed = parseFloat(document.getElementById('nb-difficulty').value);
        document.getElementById('setup-screen').style.display = 'none';
        camera.position.set(0, 1.7, -6); startTime = Date.now(); gameActive = true;
        prizesInside.forEach((p, i) => { p.visible = i < prizesLeft; });
        monsters.forEach((m, i) => { if(i < nbCount) { m.position.set((Math.random()-0.5)*150, 1.75, (Math.random()-0.5)*150); m.visible = true; } else { m.visible = false; }});
        gameState = "WALK"; document.body.requestPointerLock(); updateLeaderboard();
    };

    function updateLeaderboard() {
        const scores = JSON.parse(localStorage.getItem('arcadeScores') || "[]");
        document.getElementById('score-list').innerHTML = scores.sort((a,b) => a.time - b.time).slice(0,5).map(s => `<div>${s.name}: ${s.time}s</div>`).join('');
    }

    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement && gameState === "WALK") {
            yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
        }
    });

    document.addEventListener('keydown', (e) => {
        if(gameState === "WALK") {
            if(e.code === 'KeyW') moveF = true; if(e.code === 'KeyS') moveB = true; 
            if(e.code === 'KeyA') moveL = true; if(e.code === 'KeyD') moveR = true;
            if(e.code === 'ShiftLeft') isRunning = true;
            if(e.code === 'Space' && isGrounded) { velocityY = 0.22; isGrounded = false; }
            if(e.code === 'KeyE') {
                coins.forEach(c => { if(c.visible && camera.position.distanceTo(c.position) < 3) { c.visible = false; coinsCount++; document.getElementById('coin-val').innerText = coinsCount; }});
                if(chestGroup.visible && camera.position.distanceTo(chestGroup.position) < 3) { chestGroup.visible = false; coinsCount += 10; document.getElementById('coin-val').innerText = coinsCount; }
                if(camera.position.distanceTo(new THREE.Vector3(0,0,-10)) < 4 && coinsCount > 0) {
                    gameState = "CLAW"; document.exitPointerLock(); document.getElementById('game-info').style.display = 'block';
                    camera.position.set(0, 4.5, -6.5); camera.lookAt(0, 2, -10);
                }
            }
        } else if (gameState === "CLAW") {
            if(e.code === 'ArrowLeft') clawKeys.left = true;
            if(e.code === 'ArrowRight') clawKeys.right = true;
            if(e.code === 'ArrowUp') clawKeys.up = true;
            if(e.code === 'ArrowDown') clawKeys.down = true;
            if(e.code === 'Space') startFishing();
            if(e.code === 'Escape') exitMachine();
        }
    });

    document.addEventListener('keyup', (e) => { 
        if(e.code === 'KeyW') moveF = false; if(e.code === 'KeyS') moveB = false; 
        if(e.code === 'KeyA') moveL = false; if(e.code === 'KeyD') moveR = false; 
        if(e.code === 'ShiftLeft') isRunning = false;
        if(e.code === 'ArrowLeft') clawKeys.left = false;
        if(e.code === 'ArrowRight') clawKeys.right = false;
        if(e.code === 'ArrowUp') clawKeys.up = false;
        if(e.code === 'ArrowDown') clawKeys.down = false;
    });

    function exitMachine() {
        gameState = "WALK"; document.getElementById('game-info').style.display = 'none';
        document.body.requestPointerLock(); camera.position.set(0, 1.7, -6);
    }

    function startFishing() {
        if(isClawDescending || coinsCount <= 0) return;
        isClawDescending = true; let stage = "DOWN";
        const interval = setInterval(() => {
            if(stage === "DOWN") { clawOpen = 1; clawSystem.position.y -= 0.05; if(clawSystem.position.y <= 1.8) stage = "GRAB"; }
            else if(stage === "GRAB") { clawOpen -= 0.1; if(clawOpen <= 0) { prizesInside.forEach(p => { if(p.visible && p.position.distanceTo(new THREE.Vector3(clawSystem.position.x, 1.5, clawSystem.position.z)) < 0.5) caughtPrize = p; }); stage = "UP"; } }
            else if(stage === "UP") { clawSystem.position.y += 0.04; if(caughtPrize) caughtPrize.position.set(clawSystem.position.x, clawSystem.position.y - 0.5, clawSystem.position.z); if(clawSystem.position.y >= 5) stage = "DONE"; }
            else {
                if(caughtPrize) { caughtPrize.visible = false; prizesLeft--; document.getElementById('prizes-val').innerText = Math.max(0, prizesLeft); caughtPrize = null; if(prizesLeft <= 0) endGame(); }
                coinsCount--; document.getElementById('coin-val').innerText = coinsCount;
                clearInterval(interval); isClawDescending = false;
                if(coinsCount <= 0) exitMachine();
            }
        }, 20);
    }

    function endGame() {
        gameActive = false; let finalTime = ((Date.now() - startTime) / 1000).toFixed(1);
        const scores = JSON.parse(localStorage.getItem('arcadeScores') || "[]");
        scores.push({name: playerName, time: parseFloat(finalTime)});
        localStorage.setItem('arcadeScores', JSON.stringify(scores));
        document.exitPointerLock();
        document.getElementById('final-stats').innerText = `${playerName} finalizou em ${finalTime}s!`;
        document.getElementById('end-screen').style.display = 'flex';
        gameState = "END";
    }

    function animate() {
        requestAnimationFrame(animate); 
        if(gameActive) {
            document.getElementById('timer-val').innerText = ((Date.now() - startTime) / 1000).toFixed(1);
            if(isRunning && (moveF || moveB || moveL || moveR) && stamina > 0) { stamina -= 0.2; if(stamina < 0) stamina = 0; } else { if(stamina < 100) stamina += 0.15; }
            document.getElementById('stamina-bar').style.width = stamina + "%";
        }
        if(gameState === "CLAW" && !isClawDescending) {
            const mSpeed = 0.05;
            if(clawKeys.left && clawSystem.position.x > -1.5) clawSystem.position.x -= mSpeed;
            if(clawKeys.right && clawSystem.position.x < 1.5) clawSystem.position.x += mSpeed;
            if(clawKeys.up && clawSystem.position.z > -1.5) clawSystem.position.z -= mSpeed;
            if(clawKeys.down && clawSystem.position.z < 1.5) clawSystem.position.z += mSpeed;
        }
        pinchers.forEach(p => { p.rotation.z = clawOpen * 0.5; });
        if(gameState === "WALK") {
            velocityY -= 0.01; camera.position.y += velocityY;
            if(camera.position.y <= 1.7) { camera.position.y = 1.7; velocityY = 0; isGrounded = true; }
            platforms.forEach(p => {
                const dx = Math.abs(camera.position.x - p.position.x), dz = Math.abs(camera.position.z - p.position.z);
                const playerBottom = camera.position.y - 1.7;
                if(dx < 2.2 && dz < 2.2) {
                    const platTop = p.position.y + 0.25;
                    if(velocityY <= 0 && playerBottom >= platTop - 0.2 && playerBottom <= platTop + 0.3) { camera.position.y = platTop + 1.7; velocityY = 0; isGrounded = true; }
                }
            });
            obstacles.forEach(o => { if(camera.position.distanceTo(o.position) < 1.3) camera.position.set(0, 1.7, -6); });
            monsters.forEach(m => { if(m.visible) {
                m.lookAt(camera.position.x, 1.75, camera.position.z);
                const dir = new THREE.Vector3().subVectors(camera.position, m.position).normalize();
                m.position.x += dir.x * nbSpeed; m.position.z += dir.z * nbSpeed;
                if(m.position.distanceTo(camera.position) < 1.8) camera.position.set(0, 1.7, -6);
            }});
            if(document.pointerLockElement) {
                const currentSpeed = (isRunning && stamina > 0) ? 0.32 : 0.18;
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
                if (moveF) camera.position.addScaledVector(dir, currentSpeed); if (moveB) camera.position.addScaledVector(dir, -currentSpeed);
                if (moveL) camera.position.addScaledVector(side, currentSpeed); if (moveR) camera.position.addScaledVector(side, -currentSpeed);
                document.getElementById('prompt').style.display = (camera.position.distanceTo(new THREE.Vector3(0,0,-10)) < 4) ? 'block' : 'none';
            }
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
