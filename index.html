<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arcade Park - Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: rgba(255,255,255,0.7);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; border: 1px solid black; mix-blend-mode: difference;
        }
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 30px; box-sizing: border-box; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .stats-container { display: flex; gap: 20px; pointer-events: auto; }
        .stats {
            background: rgba(0,0,0,0.7); color: #ffd700;
            padding: 10px 20px; border-radius: 30px;
            font-size: 18px; border: 2px solid #ffd700;
        }
        #luck-timer {
            display: none; background: #00ff00; color: black; font-weight: bold;
            padding: 5px 15px; border-radius: 10px; margin-top: 10px;
        }
        #prompt {
            color: white; font-size: 24px; font-weight: bold;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 15px;
            display: none; border-bottom: 4px solid #ffd700;
        }
        #setup-screen {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        input { padding: 10px; font-size: 20px; border-radius: 5px; border: none; margin: 10px; }
        button { padding: 10px 20px; font-size: 20px; cursor: pointer; background: #ffd700; border: none; border-radius: 5px; font-weight: bold; }
        #reset-game-btn { background: #ff4444; color: white; border: 2px solid white; margin-left: 10px; }
        #leaderboard {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8);
            padding: 15px; border-radius: 10px; border: 1px solid #ffd700; color: #fff; font-size: 14px;
        }
        #game-info {
            position: absolute; top: 100px; right: 20px;
            background: rgba(0,0,0,0.8); color: white; padding: 20px;
            border-radius: 15px; display: none; border: 2px solid #00ffff;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: #ffd700;">ARCADE PARK CHALLENGE</h1>
        <input type="text" id="player-name" placeholder="Digite seu nome..." maxlength="15">
        <button onclick="startGame()">INICIAR JOGO</button>
    </div>

    <div id="leaderboard">
        <strong style="color: #ffd700;">RANKING:</strong>
        <div id="score-list"></div>
    </div>

    <div id="crosshair"></div>
    <div id="ui-layer">
        <div class="stats-container">
            <div class="stats">MOEDAS: <span id="coin-val">0</span></div>
            <div class="stats" style="color: #00ffcc; border-color: #00ffcc;">RESTAM: <span id="prizes-val">10</span></div>
            <div class="stats" style="color: #ff4444; border-color: #ff4444;">TEMPO: <span id="timer-val">0.0</span>s</div>
            <button id="reset-game-btn" onclick="resetCurrentMatch()">RESETAR PARTIDA</button>
            <button id="reset-btn" style="display:none" onclick="location.reload()">NOVO JOGO</button>
        </div>
        <div id="luck-timer">SORTE ATIVA: <span id="luck-val">30</span>s</div>
        <div id="prompt">Pressione [E] para interagir</div>
    </div>

    <div id="game-info">
        <h2 style="color:#00ffff; margin-top:0">MODO GARRA</h2>
        <ul style="list-style:none; padding:0">
            <li>Setas: Mover Garra</li>
            <li>Mouse: Girar Câmera</li>
            <li>Espaço: Pescar</li>
            <li>ESC: Sair</li>
        </ul>
    </div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    
    // CÉU
    const skyGeo = new THREE.SphereGeometry(400, 32, 15);
    const skyMat = new THREE.ShaderMaterial({ 
        vertexShader: `varying vec3 vWorldPosition; void main() { vec4 worldPosition = modelMatrix * vec4( position, 1.0 ); vWorldPosition = worldPosition.xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 ); }`, 
        fragmentShader: `uniform vec3 topColor; uniform vec3 bottomColor; varying vec3 vWorldPosition; void main() { float h = normalize( vWorldPosition ).y; gl_FragColor = vec4( mix( bottomColor, topColor, max( h, 0.0 ) ), 1.0 ); }`,
        uniforms: { topColor: { value: new THREE.Color(0x0077ff) }, bottomColor: { value: new THREE.Color(0xffffff) } },
        side: THREE.BackSide 
    });
    scene.add(new THREE.Mesh(skyGeo, skyMat));

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(50, 100, 50);
    sun.castShadow = true;
    scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));

    // --- CHÃO DE GRAMA REALISTA (SHADER DE VENTO E VARIAÇÃO DE COR) ---
    const groundGeo = new THREE.PlaneGeometry(1000, 1000, 100, 100);
    const groundMat = new THREE.ShaderMaterial({
        uniforms: {
            time: { value: 0 },
            colorBase: { value: new THREE.Color(0x348C31) },
            colorTip: { value: new THREE.Color(0x55AE4A) }
        },
        vertexShader: `
            uniform float time;
            varying vec2 vUv;
            varying float vWind;
            void main() {
                vUv = uv;
                // Simulação simples de vento baseada na posição e tempo
                vWind = sin(position.x * 0.1 + time) * cos(position.y * 0.1 + time) * 0.5;
                vec3 newPos = position;
                // Move os vértices levemente para simular o balanço
                if (position.y > 0.0) { // Aplica apenas "acima" do nível base se houver altura
                    newPos.x += vWind * 0.2;
                }
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
            }
        `,
        fragmentShader: `
            uniform vec3 colorBase;
            uniform vec3 colorTip;
            varying vec2 vUv;
            varying float vWind;
            void main() {
                // Mix de cores baseado no "vento" e UV para criar textura
                float factor = vUv.y + vWind * 0.1;
                vec3 finalColor = mix(colorBase, colorTip, factor);
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `,
        side: THREE.DoubleSide
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // PÁSSAROS (Sistema de partículas original)
    const birds = [];
    const birdGeo = new THREE.BufferGeometry();
    birdGeo.setAttribute('position', new THREE.Float32BufferAttribute([-0.2,0,0, 0,0,0.3, 0.2,0,0], 3));
    const birdMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
    for(let i=0; i<15; i++){
        const bird = new THREE.Mesh(birdGeo, birdMat);
        const angle = Math.random() * Math.PI * 2;
        const dist = 20 + Math.random() * 50;
        bird.userData = { angle: angle, speed: 0.01 + Math.random()*0.02, dist: dist, height: 20 + Math.random()*15 };
        scene.add(bird);
        birds.push(bird);
    }

    // --- ÁRVORES COM FOLHAS REALISTAS (SHADER DE BALANÇO) ---
    const leafGeo = new THREE.DodecahedronGeometry(2);
    const leafMat = new THREE.ShaderMaterial({
        uniforms: {
            time: { value: 0 },
            color: { value: new THREE.Color(0x2E7D32) }
        },
        vertexShader: `
            uniform float time;
            void main() {
                vec3 newPos = position;
                // Balanço orgânico das folhas
                newPos.x += sin(time + position.y) * 0.1;
                newPos.y += cos(time + position.x) * 0.05;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
            }
        `,
        fragmentShader: `
            uniform vec3 color;
            void main() {
                gl_FragColor = vec4(color, 1.0);
            }
        `
    });

    for(let i=0; i<50; i++) {
        const x = Math.random() * 160 - 80, z = Math.random() * 160 - 80;
        if (Math.abs(x) > 10 || Math.abs(z) > 15) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 4), new THREE.MeshStandardMaterial({color:0x5D4037}));
            trunk.position.y = 2; tree.add(trunk);
            const foliage = new THREE.Mesh(leafGeo, leafMat);
            foliage.position.y = 4.5; tree.add(foliage);
            tree.position.set(x, 0, z); scene.add(tree);
        }
    }

    // --- PARKOUR MELHORADO E APROXIMADO ---
    const parkourStartPos = new THREE.Vector3(50, 1.7, -30);
    const movingPlatforms = [];
    const allPlatforms = [];
    const parkourGroup = new THREE.Group();

    function createPlatform(x, y, z, w, d, moving = false) {
        const geo = new THREE.BoxGeometry(w, 0.8, d);
        const mat = new THREE.MeshStandardMaterial({ color: moving ? 0x00ffff : 0xff4400 });
        const plat = new THREE.Mesh(geo, mat);
        plat.position.set(x, y, z);
        parkourGroup.add(plat);
        allPlatforms.push(plat);
        if(moving) movingPlatforms.push({mesh: plat, startZ: z, dir: 1});
    }

    // Percurso ajustado para ser mais próximo e jogável
    createPlatform(50, 0.5, -30, 6, 6);   // Base
    createPlatform(50, 2.5, -36, 3, 3);   // Aproximado (era -40)
    createPlatform(55, 4.5, -36, 3, 3);   // Aproximado (era 58, -40)
    createPlatform(60, 6.5, -36, 3, 3, true); // Móvel aproximado (era 66, -40)
    createPlatform(60, 8.5, -42, 4, 4);   // Aproximado (era 66, -50)
    createPlatform(55, 10.5, -48, 2, 2);  // Aproximado (era 58, -58)
    
    // Novos obstáculos adicionais (aproximados)
    createPlatform(49, 11.5, -48, 2, 2);
    createPlatform(43, 12.5, -42, 3, 3, true);
    createPlatform(37, 13.5, -36, 2, 2);
    createPlatform(37, 14.5, -30, 3, 3);
    createPlatform(43, 15.5, -24, 2, 2);
    createPlatform(50, 16.5, -24, 3, 3);
    createPlatform(57, 17.5, -28, 2, 6, true);
    createPlatform(57, 18.5, -38, 4, 4);
    createPlatform(50, 19.5, -46, 3, 3);
    createPlatform(50, 20.0, -55, 8, 8); // Nova base final aproximada
    scene.add(parkourGroup);

    const potion = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 0.8), new THREE.MeshStandardMaterial({color: 0x00ff00, emissive: 0x00ff00}));
    potion.position.set(50, 21.5, -55);
    scene.add(potion);

    const finalCoins = [];
    let finalCoinsCollected = false;
    for(let i=0; i<5; i++) {
        const c = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.05), new THREE.MeshStandardMaterial({ color: 0x00ff00, metalness: 0.9 }));
        c.position.set(48 + i, 21, -57);
        c.rotation.x = Math.PI/2;
        scene.add(c);
        finalCoins.push(c);
    }

    // MOEDAS INICIAIS
    const coins = [];
    for(let i=0; i<30; i++) {
        const c = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.015), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9 }));
        c.position.set(Math.random()*80-40, 0.1, Math.random()*80-40);
        c.rotation.x = Math.PI/2;
        scene.add(c); coins.push(c);
    }

    // MÃO
    const handGroup = new THREE.Group();
    const palm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.08, 0.35), new THREE.MeshStandardMaterial({color: 0xffdbac}));
    const heldCoin = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.015), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9 }));
    heldCoin.position.set(0, 0.08, 0); heldCoin.visible = false;
    handGroup.add(palm, heldCoin);
    handGroup.position.set(0.6, -0.6, -1);
    camera.add(handGroup);
    scene.add(camera);

    // MÁQUINA (mantida original)
    const machine = new THREE.Group();
    const base = new THREE.Mesh(new THREE.BoxGeometry(3.2, 1.2, 3.2), new THREE.MeshStandardMaterial({color: 0xcc0000}));
    base.position.y = 0.6; machine.add(base);

    const panel = new THREE.Mesh(new THREE.BoxGeometry(2, 0.4, 0.8), new THREE.MeshStandardMaterial({color: 0x222222}));
    panel.position.set(0, 1.2, 1.5); machine.add(panel);
    
    const joystickBase = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshStandardMaterial({color: 0x000000}));
    joystickBase.position.set(-0.5, 1.45, 1.5); machine.add(joystickBase);
    const joystickStick = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5), new THREE.MeshStandardMaterial({color: 0xcccccc}));
    joystickStick.position.set(-0.5, 1.6, 1.5); machine.add(joystickStick);
    
    const machineButton = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.1), new THREE.MeshStandardMaterial({color: 0xff0000}));
    machineButton.position.set(0.5, 1.4, 1.5); machine.add(machineButton);

    const glass = new THREE.Mesh(new THREE.BoxGeometry(3, 3.5, 3), new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.15}));
    glass.position.y = 2.8; machine.add(glass);
    
    const prizesInside = [];
    for(let i=0; i<10; i++) {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.22), new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff }));
        p.position.set((Math.random()-0.5)*2.4, 1.3, (Math.random()-0.5)*2.4);
        machine.add(p); prizesInside.push(p);
    }
    const clawSystem = new THREE.Group();
    const cable = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 3), new THREE.MeshStandardMaterial({color:0x333333}));
    cable.position.y = 1.5;
    const clawHead = new THREE.Group();
    const pinchers = [];
    for(let i=0; i<3; i++) {
        const pPivot = new THREE.Group();
        const pMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.6, 0.05), new THREE.MeshStandardMaterial({color:0xcccccc}));
        pMesh.position.y = -0.3; pMesh.position.z = 0.15;
        pPivot.add(pMesh); pPivot.rotation.y = (Math.PI*2/3)*i;
        clawHead.add(pPivot); pinchers.push(pPivot);
    }
    clawSystem.add(cable, clawHead);
    clawSystem.position.set(0, 4.5, 0); machine.add(clawSystem);
    machine.position.set(0, 0, -10); scene.add(machine);

    // LÓGICA E ESTADOS (mantidos originais)
    let playerName = "";
    let coinsCount = 0, prizesLeft = 10;
    let gameState = "SETUP", isClawDescending = false;
    let startTime = 0, gameActive = false;
    let moveF = false, moveB = false, moveL = false, moveR = false;
    let velocityY = 0, canJump = true, yaw = 0, pitch = 0, clawOpen = 1;
    let luckTime = 0, isLuckActive = false;
    let clawOrbitAngle = 0;

    window.startGame = () => {
        playerName = document.getElementById('player-name').value || "Player";
        document.getElementById('setup-screen').style.display = 'none';
        gameState = "WALK";
    };

    window.resetCurrentMatch = () => {
        camera.position.set(0, 1.7, 0); velocityY = 0;
        startTime = Date.now(); isLuckActive = false;
        document.getElementById('luck-timer').style.display = 'none';
    };

    document.addEventListener('mousedown', () => { 
        if(gameState === "WALK" || gameState === "CLAW") document.body.requestPointerLock(); 
    });
    
    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement) {
            if(gameState === "WALK") {
                if(!gameActive) { startTime = Date.now(); gameActive = true; }
                yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            } else if(gameState === "CLAW") {
                clawOrbitAngle -= e.movementX * 0.005;
            }
        }
    });

    document.addEventListener('keydown', (e) => {
        if(gameState === "WALK") {
            if(e.code === 'KeyW') moveF = true; if(e.code === 'KeyS') moveB = true; 
            if(e.code === 'KeyA') moveL = true; if(e.code === 'KeyD') moveR = true;
            if(e.code === 'Space' && canJump) { velocityY = 0.25; canJump = false; }
            if(e.code === 'KeyE') {
                coins.forEach(c => { if(c.visible && camera.position.distanceTo(c.position) < 3) { c.visible = false; coinsCount++; document.getElementById('coin-val').innerText = coinsCount; }});
                if(potion.visible && camera.position.distanceTo(potion.position) < 3) { potion.visible = false; isLuckActive = true; luckTime = 30; document.getElementById('luck-timer').style.display = 'block'; }
                if(!finalCoinsCollected && camera.position.distanceTo(finalCoins[0].position) < 6) { finalCoins.forEach(c => c.visible = false); coinsCount += 5; finalCoinsCollected = true; document.getElementById('coin-val').innerText = coinsCount; }
                if(camera.position.distanceTo(machine.position) < 4 && coinsCount > 0) { 
                    gameState = "CLAW"; 
                    document.getElementById('game-info').style.display = 'block'; 
                    clawOrbitAngle = Math.PI;
                }
            }
        } else if(gameState === "CLAW" && !isClawDescending) {
            if(e.code === 'ArrowLeft' && clawSystem.position.x > -1.2) clawSystem.position.x -= 0.05;
            if(e.code === 'ArrowRight' && clawSystem.position.x < 1.2) clawSystem.position.x += 0.05;
            if(e.code === 'ArrowUp' && clawSystem.position.z > -1.2) clawSystem.position.z -= 0.05;
            if(e.code === 'ArrowDown' && clawSystem.position.z < 1.2) clawSystem.position.z += 0.05;
            if(e.code === 'Space') startFishing();
            if(e.code === 'Escape') { 
                gameState = "WALK"; 
                document.getElementById('game-info').style.display = 'none'; 
                camera.position.set(0, 1.7, -6); 
                camera.rotation.set(0,0,0);
                yaw = 0; pitch = 0;
            }
        }
    });

    document.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') moveF = false; if(e.code === 'KeyS') moveB = false; 
        if(e.code === 'KeyA') moveL = false; if(e.code === 'KeyD') moveR = false;
    });

    function startFishing() {
        isClawDescending = true; let stage = "DOWN"; let caughtPrizes = [];
        const interval = setInterval(() => {
            if(stage === "DOWN") { clawSystem.position.y -= 0.04; if(clawSystem.position.y <= 1.75) stage = "GRAB"; }
            else if(stage === "GRAB") {
                clawOpen -= 0.1;
                if(clawOpen <= 0) {
                    const maxPrizes = isLuckActive ? 2 : 1;
                    prizesInside.forEach(p => { if(p.visible && caughtPrizes.length < maxPrizes && p.position.distanceTo(new THREE.Vector3(clawSystem.position.x, 1.3, clawSystem.position.z)) < 0.6) caughtPrizes.push(p); });
                    stage = "UP";
                }
            }
            else if(stage === "UP") { clawSystem.position.y += 0.04; caughtPrizes.forEach(p => p.position.set(clawSystem.position.x, clawSystem.position.y-0.4, clawSystem.position.z)); if(clawSystem.position.y >= 4.5) stage = "DONE"; }
            else { caughtPrizes.forEach(p => { p.visible = false; prizesLeft--; }); coinsCount--; document.getElementById('coin-val').innerText = coinsCount; document.getElementById('prizes-val').innerText = prizesLeft; clawOpen = 1; clearInterval(interval); isClawDescending = false; if(prizesLeft <= 0) alert("VITÓRIA!"); }
        }, 20);
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now() * 0.001;
        
        // Atualiza o tempo nos shaders da grama e folhas
        groundMat.uniforms.time.value = time;
        leafMat.uniforms.time.value = time;

        birds.forEach(b => {
            b.userData.angle += b.userData.speed;
            b.position.x = Math.cos(b.userData.angle) * b.userData.dist;
            b.position.z = Math.sin(b.userData.angle) * b.userData.dist;
            b.position.y = b.userData.height + Math.sin(time + b.userData.angle) * 2;
            b.lookAt(Math.cos(b.userData.angle + 0.1) * b.userData.dist, b.position.y, Math.sin(b.userData.angle + 0.1) * b.userData.dist);
        });

        if(gameState === "WALK") {
            velocityY -= 0.01; camera.position.y += velocityY;
            let onPlatform = false;
            allPlatforms.forEach(p => {
                const dx = Math.abs(camera.position.x - p.position.x);
                const dz = Math.abs(camera.position.z - p.position.z);
                const platHalfW = p.geometry.parameters.width / 2;
                const platHalfD = p.geometry.parameters.depth / 2;
                if(dx < platHalfW && dz < platHalfD && camera.position.y >= p.position.y + 1.2 && camera.position.y <= p.position.y + 1.8) {
                    camera.position.y = p.position.y + 1.7; velocityY = 0; canJump = true; onPlatform = true;
                }
            });
            if(!onPlatform && camera.position.y <= 1.7) { camera.position.y = 1.7; velocityY = 0; canJump = true; }
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
            if (moveF) camera.position.addScaledVector(dir, 0.15); if (moveB) camera.position.addScaledVector(dir, -0.15);
            if (moveL) camera.position.addScaledVector(side, 0.15); if (moveR) camera.position.addScaledVector(side, -0.15);
            if(camera.position.x > 45 && camera.position.y < 0.8) camera.position.copy(parkourStartPos);
        } else if(gameState === "CLAW") {
            const orbitRadius = 6;
            camera.position.x = machine.position.x + Math.sin(clawOrbitAngle) * orbitRadius;
            camera.position.z = machine.position.z + Math.cos(clawOrbitAngle) * orbitRadius;
            camera.position.y = 4;
            camera.lookAt(machine.position.x, 2.5, machine.position.z);
        }

        movingPlatforms.forEach(p => { p.mesh.position.z += 0.05 * p.dir; if(Math.abs(p.mesh.position.z - p.startZ) > 5) p.dir *= -1; });
        if(isLuckActive) { luckTime -= 0.016; document.getElementById('luck-val').innerText = Math.ceil(luckTime); if(luckTime <= 0) { isLuckActive = false; document.getElementById('luck-timer').style.display = 'none'; }}
        if(gameActive) document.getElementById('timer-val').innerText = ((Date.now() - startTime) / 1000).toFixed(1);
        pinchers.forEach(p => p.rotation.x = 0.8 * (1 - clawOpen));
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
