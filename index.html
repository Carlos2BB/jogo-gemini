<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arcade Park - Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: rgba(255,255,255,0.7);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; border: 1px solid black; mix-blend-mode: difference;
        }
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 30px; box-sizing: border-box; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .stats-container { display: flex; gap: 20px; pointer-events: auto; }
        .stats {
            background: rgba(0,0,0,0.7); color: #ffd700;
            padding: 10px 20px; border-radius: 30px;
            font-size: 18px; border: 2px solid #ffd700;
        }
        #luck-timer {
            display: none; background: rgba(0, 255, 0, 0.8); color: black; font-weight: bold;
            padding: 10px 20px; border-radius: 15px; margin-top: 15px;
            border: 2px solid white; font-size: 20px;
        }
        #prompt {
            color: white; font-size: 24px; font-weight: bold;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 15px;
            display: none; border-bottom: 4px solid #ffd700;
        }
        #setup-screen {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        button { padding: 10px 20px; font-size: 20px; cursor: pointer; background: #ffd700; border: none; border-radius: 5px; font-weight: bold; }
        #game-info {
            position: absolute; top: 100px; right: 20px;
            background: rgba(0,0,0,0.8); color: white; padding: 20px;
            border-radius: 15px; display: none; border: 2px solid #00ffff;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: #ffd700;">ARCADE PARK CHALLENGE</h1>
        <button onclick="startGame()">INICIAR JOGO</button>
    </div>

    <div id="crosshair"></div>
    <div id="ui-layer">
        <div class="stats-container">
            <div class="stats">MOEDAS: <span id="coin-val">0</span></div>
            <div class="stats" style="color: #00ffcc; border-color: #00ffcc;">PREMIOS: <span id="prizes-val">10</span></div>
            <div class="stats" style="color: #ff4444; border-color: #ff4444;">TEMPO: <span id="timer-val">0.0</span>s</div>
        </div>
        <div id="luck-timer">SORTE ATIVA: <span id="luck-val">30.0</span>s</div>
        <div id="prompt">Pressione [E] para interagir</div>
    </div>

    <div id="game-info">
        <h2 style="color:#00ffff; margin-top:0">MODO GARRA</h2>
        <ul style="list-style:none; padding:0">
            <li>Setas: Mover Garra</li>
            <li>Mouse: Olhar para Lados</li>
            <li>Espaço: Pescar</li>
            <li>ESC: Sair</li>
        </ul>
    </div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    
    // CÉU E LUZ
    const skyGeo = new THREE.SphereGeometry(400, 32, 15);
    const skyMat = new THREE.ShaderMaterial({ 
        vertexShader: `varying vec3 vWorldPosition; void main() { vec4 worldPosition = modelMatrix * vec4( position, 1.0 ); vWorldPosition = worldPosition.xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 ); }`, 
        fragmentShader: `uniform vec3 topColor; uniform vec3 bottomColor; varying vec3 vWorldPosition; void main() { float h = normalize( vWorldPosition ).y; gl_FragColor = vec4( mix( bottomColor, topColor, max( h, 0.0 ) ), 1.0 ); }`,
        uniforms: { topColor: { value: new THREE.Color(0x0077ff) }, bottomColor: { value: new THREE.Color(0xffffff) } },
        side: THREE.BackSide 
    });
    scene.add(new THREE.Mesh(skyGeo, skyMat));

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(50, 100, 50);
    sun.castShadow = true;
    scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));

    // GRAMA E ÁRVORES
    const groundGeo = new THREE.PlaneGeometry(1000, 1000);
    const groundMat = new THREE.MeshStandardMaterial({color: 0x348C31});
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // PÁSSAROS REFEITOS (Voo Linear)
    const birds = [];
    function createBird() {
        const b = new THREE.Mesh(new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute([-0.3,0,0, 0,0,0.4, 0.3,0,0], 3)), new THREE.MeshBasicMaterial({color:0x000, side:2}));
        resetBird(b);
        scene.add(b);
        birds.push(b);
    }
    function resetBird(b) {
        const side = Math.random() > 0.5 ? 1 : -1;
        b.position.set(200 * side, 30 + Math.random()*20, (Math.random()-0.5)*200);
        b.userData = { vel: new THREE.Vector3(-side * (0.3 + Math.random()*0.4), 0, (Math.random()-0.5)*0.1) };
    }
    for(let i=0; i<6; i++) createBird();

    // PARKOUR E POÇÃO
    const allPlatforms = [];
    function createPlat(x,y,z,w,d) {
        const p = new THREE.Mesh(new THREE.BoxGeometry(w,0.8,d), new THREE.MeshStandardMaterial({color:0xff4400}));
        p.position.set(x,y,z); scene.add(p); allPlatforms.push(p);
    }
    createPlat(50, 0.5, -30, 6, 6);
    createPlat(50, 2.5, -36, 3, 3);
    createPlat(55, 4.5, -36, 3, 3);
    createPlat(50, 6.5, -32, 4, 4);
    const potion = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 0.8), new THREE.MeshStandardMaterial({color: 0x00ff00, emissive: 0x00ff00}));
    potion.position.set(50, 8, -32); scene.add(potion);

    // MOEDAS
    const coins = [];
    for(let i=0; i<15; i++) {
        const c = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.02), new THREE.MeshStandardMaterial({color:0xffd700}));
        c.position.set(Math.random()*40-20, 0.2, Math.random()*40-20);
        c.rotation.x = Math.PI/2; scene.add(c); coins.push(c);
    }

    // MÁQUINA
    const machine = new THREE.Group();
    const mBase = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 4), new THREE.MeshStandardMaterial({color:0xcc0000}));
    mBase.position.y = 0.75; machine.add(mBase);
    const mGlass = new THREE.Mesh(new THREE.BoxGeometry(3.8, 4, 3.8), new THREE.MeshStandardMaterial({color:0xffffff, transparent:true, opacity:0.2}));
    mGlass.position.y = 3.5; machine.add(mGlass);
    const clawSystem = new THREE.Group();
    const clawHead = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshStandardMaterial({color:0x888}));
    clawSystem.add(clawHead); clawSystem.position.set(0, 5, 0); machine.add(clawSystem);
    
    const prizes = [];
    for(let i=0; i<10; i++){
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({color: Math.random()*0xffffff}));
        p.position.set(Math.random()*2.5-1.25, 1.8, Math.random()*2.5-1.25);
        machine.add(p); prizes.push(p);
    }
    machine.position.set(0, 0, -10); scene.add(machine);

    // LÓGICA DE JOGO
    let gameState = "WALK", coinsCount = 0, prizesLeft = 10;
    let yaw = 0, pitch = 0, velocityY = 0, canJump = true;
    let luckTime = 0, isLuckActive = false;
    let clawYaw = 0; // Para olhar pros lados na máquina

    window.startGame = () => { document.getElementById('setup-screen').style.display = 'none'; };

    document.addEventListener('mousemove', (e) => {
        if (!document.pointerLockElement) return;
        if(gameState === "WALK") {
            yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
        } else if(gameState === "CLAW") {
            // Movimento lateral limitado para ver os prêmios
            clawYaw -= e.movementX * 0.002;
            clawYaw = Math.max(-0.6, Math.min(0.6, clawYaw));
            camera.rotation.y = Math.PI + clawYaw;
        }
    });

    document.addEventListener('keydown', (e) => {
        if(e.code === 'KeyE') {
            // Coletar moedas
            coins.forEach(c => { if(c.visible && camera.position.distanceTo(c.position) < 3) { c.visible = false; coinsCount++; document.getElementById('coin-val').innerText = coinsCount; }});
            // Pegar Poção
            if(potion.visible && camera.position.distanceTo(potion.position) < 2.5) {
                potion.visible = false;
                isLuckActive = true;
                luckTime = 30;
                document.getElementById('luck-timer').style.display = 'block';
            }
            // Entrar na Máquina
            if(gameState === "WALK" && camera.position.distanceTo(machine.position) < 5 && coinsCount > 0) {
                gameState = "CLAW";
                document.getElementById('game-info').style.display = 'block';
                clawYaw = 0;
                // FIX DA CÂMERA: Posição ideal na frente do vidro olhando para dentro
                camera.position.set(0, 4, -5.5); 
                camera.rotation.set(-0.2, Math.PI, 0); 
            }
        }
        if(e.code === 'Escape' && gameState === "CLAW") {
            gameState = "WALK";
            document.getElementById('game-info').style.display = 'none';
            camera.position.set(0, 1.7, -5);
        }
        if(gameState === "WALK" && e.code === 'Space' && canJump) { velocityY = 0.2; canJump = false; }
    });

    const keys = {};
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);
    document.addEventListener('mousedown', () => document.body.requestPointerLock());

    function updatePhysics() {
        if(gameState === "WALK") {
            velocityY -= 0.008; camera.position.y += velocityY;
            let onGround = false;
            allPlatforms.forEach(p => {
                if(Math.abs(camera.position.x - p.position.x) < p.geometry.parameters.width/2 && 
                   Math.abs(camera.position.z - p.position.z) < p.geometry.parameters.depth/2 &&
                   camera.position.y > p.position.y + 1.2 && camera.position.y < p.position.y + 1.8) {
                    camera.position.y = p.position.y + 1.7; velocityY = 0; canJump = true; onGround = true;
                }
            });
            if(camera.position.y <= 1.7) { camera.position.y = 1.7; velocityY = 0; canJump = true; onGround = true; }
            
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
            if(keys['KeyW']) camera.position.addScaledVector(dir, 0.12);
            if(keys['KeyS']) camera.position.addScaledVector(dir, -0.12);
            if(keys['KeyA']) camera.position.addScaledVector(side, 0.12);
            if(keys['KeyD']) camera.position.addScaledVector(side, -0.12);
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        updatePhysics();
        
        // Pássaros voando
        const time = performance.now() * 0.001;
        birds.forEach(b => {
            b.position.add(b.userData.vel);
            b.rotation.z = Math.sin(time*10)*0.2;
            if(Math.abs(b.position.x) > 250) resetBird(b);
        });

        // Cronômetro da Poção de Sorte
        if(isLuckActive) {
            luckTime -= 0.016; // Aproximadamente 60fps
            document.getElementById('luck-val').innerText = Math.max(0, luckTime).toFixed(1);
            if(luckTime <= 0) {
                isLuckActive = false;
                document.getElementById('luck-timer').style.display = 'none';
            }
        }

        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
