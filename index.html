<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arcade Park - Final Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: rgba(255,255,255,0.7);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; border: 1px solid black; mix-blend-mode: difference; z-index: 10;
        }
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 30px; box-sizing: border-box; color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9); z-index: 5;
        }
        .stats-container { display: flex; gap: 20px; pointer-events: auto; }
        .stats {
            background: rgba(0,0,0,0.85); color: #ffd700;
            padding: 10px 25px; border-radius: 30px;
            font-size: 18px; border: 2px solid #ffd700;
        }
        #prompt {
            color: white; font-size: 24px; font-weight: bold;
            background: rgba(0,0,0,0.8); padding: 15px 25px; border-radius: 15px;
            display: none; border-bottom: 4px solid #ffd700;
        }
        #setup-screen, #end-screen {
            position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #222 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200;
        }
        #end-screen { display: none; }
        input { padding: 12px; font-size: 20px; border-radius: 8px; border: 2px solid #ffd700; margin: 10px; width: 280px; background: #111; color: white; pointer-events: auto; }
        button { padding: 12px 30px; font-size: 20px; cursor: pointer; background: #ffd700; border: none; border-radius: 8px; font-weight: bold; pointer-events: auto; }
        
        /* CHAT SYSTEM */
        #chat-container {
            position: absolute; bottom: 20px; left: 20px; width: 350px;
            background: rgba(0,0,0,0.7); border-radius: 10px; display: flex; flex-direction: column;
            pointer-events: auto; border: 1px solid rgba(255,255,255,0.2); z-index: 150;
        }
        #chat-messages { height: 120px; overflow-y: auto; padding: 10px; color: white; font-size: 13px; display: flex; flex-direction: column-reverse; }
        #chat-input { 
            background: #000; border: 1px solid #ffd700; padding: 10px; color: #00ff88; 
            outline: none; display: none; width: calc(100% - 22px); margin: 5px auto; font-size: 14px; pointer-events: auto;
        }

        #leaderboard {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85);
            padding: 15px; border-radius: 12px; border: 1px solid #ffd700; color: #fff; font-size: 14px; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: #ffd700; font-size: 48px;">ARCADE PARK</h1>
        <label style="color: #ffd700;">JOGADORES:</label>
        <input type="number" id="total-players" value="1" min="1" max="10">
        <input type="text" id="player-name" placeholder="Seu Nome..." maxlength="15">
        <button onclick="startGame()">INICIAR</button>
    </div>

    <div id="end-screen">
        <h1 style="color: #ffd700;" id="end-title">FIM DA RODADA</h1>
        <p id="final-stats" style="font-size: 24px; color: white;"></p>
        <button id="next-player-btn" onclick="prepareNextTurn()">PRÓXIMO</button>
    </div>

    <div id="leaderboard">
        <strong style="color: #ffd700;">RANKING:</strong>
        <div id="score-list"></div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"><div>Aperte ENTER para comandos ADM</div></div>
        <input type="text" id="chat-input" placeholder="Comando...">
    </div>

    <div id="crosshair"></div>
    <div id="ui-layer">
        <div class="stats-container">
            <div class="stats">MOEDAS: <span id="coin-val">0</span></div>
            <div class="stats" style="color: #00ffcc;">ITENS: <span id="prizes-val">10</span></div>
            <div class="stats" style="color: #ff4444;">TEMPO: <span id="timer-val">0.0</span>s</div>
        </div>
        <div id="prompt">Pressione [E] para interagir</div>
    </div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- CICLO DIA E NOITE ---
    let timeScale = 1;
    let dayTime = 1500; 
    const sunLight = new THREE.DirectionalLight(0xffffff, 2);
    sunLight.castShadow = true;
    scene.add(sunLight);
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const skyGeo = new THREE.SphereGeometry(450, 32, 32);
    const skyMat = new THREE.MeshBasicMaterial({ side: THREE.BackSide, color: 0x87ceeb });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    scene.add(sky);

    // --- CHÃO E MUNDO ---
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x2d5a27 }));
    ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

    // --- ÁRVORES (CÓDIGO ORIGINAL) ---
    const trunkMat = new THREE.MeshStandardMaterial({color:0x3d2b1f});
    const foliageMat = new THREE.MeshStandardMaterial({color:0x1b4d1c});
    for(let i=0; i<65; i++) {
        const x = Math.random() * 200 - 100, z = Math.random() * 200 - 100;
        if (Math.abs(x) > 15 || Math.abs(z) > 20) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 5), trunkMat);
            trunk.position.y = 2.5; tree.add(trunk);
            const fol = new THREE.Mesh(new THREE.DodecahedronGeometry(2.5), foliageMat);
            fol.position.y = 5; tree.add(fol);
            tree.position.set(x, 0, z); scene.add(tree);
        }
    }

    // --- MOEDAS ---
    const coins = [];
    for(let i=0; i<35; i++) {
        const c = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.02), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 1 }));
        c.position.set(Math.random()*90-45, 0.5, Math.random()*90-45);
        c.rotation.x = Math.PI/2; scene.add(c); coins.push(c);
    }

    // --- ANIMAIS (COM LÓGICA DE FUGA) ---
    const animals = [];
    function createAnimal(type) {
        const group = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({color: type === 'rabbit' ? 0xeeeeee : 0xc0392b});
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.3), mat);
        group.add(body);
        group.position.set(Math.random()*100-50, 0.15, Math.random()*100-50);
        scene.add(group);
        animals.push({mesh: group, type, angle: Math.random()*6, state: 'idle', timer: 100});
    }
    for(let i=0; i<3; i++) createAnimal('rabbit');
    for(let i=0; i<2; i++) createAnimal('fox');

    // --- PARKOUR (PLATAFORMAS) ---
    const platforms = [];
    for(let i=0; i<15; i++) {
        const p = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.5, 3.5), new THREE.MeshStandardMaterial({color: 0x555555}));
        p.position.set(Math.cos(i*0.5)*15 + 15, 1 + i, Math.sin(i*0.5)*15 - 15);
        scene.add(p); platforms.push(p);
    }

    // --- MÁQUINA DE PRÊMIOS ---
    const machine = new THREE.Group();
    const mBase = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.2, 3.5), new THREE.MeshStandardMaterial({color: 0x880000}));
    mBase.position.y = 0.6; machine.add(mBase);
    const mGlass = new THREE.Mesh(new THREE.BoxGeometry(3.3, 2.7, 3.3), new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.3}));
    mGlass.position.y = 2.6; machine.add(mGlass);
    machine.position.set(0, 0, -12); scene.add(machine);

    const prizesInside = [];
    for(let i=0; i<10; i++) {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff }));
        p.position.set((Math.random()-0.5)*2.5, 1.5, (Math.random()-0.5)*2.5);
        machine.add(p); prizesInside.push(p);
    }

    const clawSystem = new THREE.Group();
    const cable = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 3), new THREE.MeshStandardMaterial({color:0x222222}));
    cable.position.y = 1.5; clawSystem.add(cable);
    clawSystem.position.set(0, 4, 0); machine.add(clawSystem);

    // --- LÓGICA DO JOGO ---
    let coinsCount = 0, prizesLeft = 10, gameState = "SETUP", startTime = 0;
    let isChatting = false, move = {f:0, b:0, l:0, r:0}, velocityY = 0, isGrounded = true;
    let isDescending = false, caughtPrize = null;

    // COMANDOS CHAT
    const chatIn = document.getElementById('chat-input');
    const chatMsgs = document.getElementById('chat-messages');

    function runCmd(c) {
        c = c.toUpperCase();
        if(c.includes("MOEDAS=")) {
            coinsCount = parseInt(c.split("=")[1]) || 0;
            document.getElementById('coin-val').innerText = coinsCount;
        } else if(c.includes("TEMPO=")) {
            timeScale = parseFloat(c.split("=")[1]) || 1;
        }
    }

    window.startGame = () => {
        if(!document.getElementById('player-name').value) return;
        document.getElementById('setup-screen').style.display = "none";
        gameState = "WALK"; startTime = Date.now();
        document.body.requestPointerLock();
    };

    window.prepareNextTurn = () => {
        location.reload();
    };

    document.addEventListener('keydown', (e) => {
        if(e.key === "Enter") {
            isChatting = !isChatting;
            chatIn.style.display = isChatting ? "block" : "none";
            if(isChatting) { document.exitPointerLock(); chatIn.focus(); }
            else { 
                if(chatIn.value) { runCmd(chatIn.value); chatIn.value = ""; }
                if(gameState === "WALK") document.body.requestPointerLock();
            }
            return;
        }
        if(isChatting) return;

        if(gameState === "WALK") {
            if(e.code === 'KeyW') move.f = 1; if(e.code === 'KeyS') move.b = 1;
            if(e.code === 'KeyA') move.l = 1; if(e.code === 'KeyD') move.r = 1;
            if(e.code === 'Space' && isGrounded) { velocityY = 0.2; isGrounded = false; }
            if(e.code === 'KeyE') {
                coins.forEach(c => { if(c.visible && camera.position.distanceTo(c.position) < 3) { c.visible = false; coinsCount++; document.getElementById('coin-val').innerText = coinsCount; }});
                if(camera.position.distanceTo(new THREE.Vector3(0,0,-12)) < 5 && coinsCount > 0) {
                    gameState = "CLAW"; document.exitPointerLock();
                    camera.position.set(0, 4, -8); camera.lookAt(0, 2, -12);
                }
            }
        } else if(gameState === "CLAW" && !isDescending) {
            if(e.code === 'ArrowLeft') clawSystem.position.x -= 0.1;
            if(e.code === 'ArrowRight') clawSystem.system.x += 0.1;
            if(e.code === 'Space') startFishing();
        }
    });

    document.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') move.f = 0; if(e.code === 'KeyS') move.b = 0;
        if(e.code === 'KeyA') move.l = 0; if(e.code === 'KeyD') move.r = 0;
    });

    function startFishing() {
        isDescending = true;
        let step = 0;
        const int = setInterval(() => {
            if(step < 40) clawSystem.position.y -= 0.05;
            else if(step < 80) {
                prizesInside.forEach(p => {
                    if(p.visible && p.position.distanceTo(new THREE.Vector3(clawSystem.position.x, 1.5, clawSystem.position.z)) < 0.6) {
                        p.visible = false; prizesLeft--; coinsCount--;
                        document.getElementById('prizes-val').innerText = prizesLeft;
                        document.getElementById('coin-val').innerText = coinsCount;
                        if(prizesLeft <= 0) endGame();
                    }
                });
                clawSystem.position.y += 0.05;
            } else { clearInterval(int); isDescending = false; if(coinsCount <= 0) { gameState="WALK"; document.body.requestPointerLock(); } }
            step++;
        }, 30);
    }

    function endGame() {
        gameState = "END";
        document.exitPointerLock();
        document.getElementById('end-screen').style.display = "flex";
        document.getElementById('final-stats').innerText = "Tempo: " + document.getElementById('timer-val').innerText + "s";
    }

    document.addEventListener('mousemove', (e) => {
        if(document.pointerLockElement && !isChatting) {
            camera.rotation.y -= e.movementX * 0.002;
            camera.rotation.x -= e.movementY * 0.002;
        }
    });

    function animate() {
        requestAnimationFrame(animate);

        // Ciclo Dia e Noite
        dayTime += 0.1 * timeScale;
        const angle = dayTime * 0.001;
        sunLight.position.set(Math.cos(angle)*100, Math.sin(angle)*100, 0);
        const intense = Math.max(0, Math.sin(angle));
        skyMat.color.setHSL(0.6, 0.5, intense * 0.4 + 0.1);
        ambientLight.intensity = intense * 0.5 + 0.1;

        // Movimento e Gravidade
        if(gameState === "WALK" && !isChatting) {
            velocityY -= 0.01; camera.position.y += velocityY;
            if(camera.position.y <= 1.7) { camera.position.y = 1.7; velocityY = 0; isGrounded = true; }
            
            // Colisão Plataformas
            platforms.forEach(p => {
                const dx = Math.abs(camera.position.x - p.position.x);
                const dz = Math.abs(camera.position.z - p.position.z);
                if(dx < 2 && dz < 2 && camera.position.y > p.position.y && camera.position.y < p.position.y + 1.5) {
                    camera.position.y = p.position.y + 1.7; velocityY = 0; isGrounded = true;
                }
            });

            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); dir.y = 0; dir.normalize();
            if(move.f) camera.position.addScaledVector(dir, 0.15);
            if(move.b) camera.position.addScaledVector(dir, -0.15);
            
            document.getElementById('timer-val').innerText = ((Date.now() - startTime)/1000).toFixed(1);
        }

        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
