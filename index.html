<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arcade Park - Nextbot Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: rgba(255,255,255,0.7);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; border: 1px solid black; mix-blend-mode: difference;
        }
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 30px; box-sizing: border-box; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .stats-container { display: flex; gap: 20px; pointer-events: auto; }
        .stats {
            background: rgba(0,0,0,0.7); color: #ffd700;
            padding: 10px 20px; border-radius: 30px;
            font-size: 18px; border: 2px solid #ffd700;
        }
        #prompt {
            color: white; font-size: 24px; font-weight: bold;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 15px;
            display: none; border-bottom: 4px solid #ffd700;
        }
        #setup-screen, #end-screen {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        #end-screen { display: none; z-index: 101; color: white; }
        input { padding: 10px; font-size: 20px; border-radius: 5px; border: none; margin: 10px; width: 250px; }
        button { padding: 10px 20px; font-size: 20px; cursor: pointer; background: #ffd700; border: none; border-radius: 5px; font-weight: bold; margin: 5px; }
        #leaderboard {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8);
            padding: 15px; border-radius: 10px; border: 1px solid #ffd700; color: #fff; font-size: 14px;
        }
        #game-info {
            position: absolute; top: 100px; right: 20px;
            background: rgba(0,0,0,0.8); color: white; padding: 20px;
            border-radius: 15px; display: none; border: 2px solid #00ffff;
        }
        label { color: #ffd700; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: #ffd700;">ARCADE PARK CHALLENGE</h1>
        <label>NÚMERO DE JOGADORES (MAX 10):</label>
        <input type="number" id="total-players" value="1" min="1" max="10">
        <label>NOME DO JOGADOR:</label>
        <input type="text" id="player-name" placeholder="Nome do jogador..." maxlength="15">
        <button onclick="startGame()">INICIAR JOGO</button>
        <button onclick="resetRanking()" style="background: #ff4444; color: white; margin-top: 50px; font-size: 12px;">LIMPAR TODO O PLACAR</button>
    </div>

    <div id="end-screen">
        <h1 style="color: #ffd700;">RODADA FINALIZADA!</h1>
        <p id="final-stats" style="font-size: 24px;"></p>
        <button id="next-player-btn" onclick="prepareNextTurn()">PRÓXIMO JOGADOR</button>
    </div>

    <div id="leaderboard">
        <strong style="color: #ffd700;">RANKING:</strong>
        <div id="score-list"></div>
    </div>

    <div id="crosshair"></div>
    <div id="ui-layer">
        <div class="stats-container">
            <div id="coin-display" class="stats">MOEDAS: <span id="coin-val">0</span></div>
            <div class="stats" style="color: #00ffcc; border-color: #00ffcc;">RESTAM: <span id="prizes-val">10</span></div>
            <div class="stats" style="color: #ff4444; border-color: #ff4444;">TEMPO: <span id="timer-val">0.0</span>s</div>
            <button onclick="location.reload()" style="background: #555; color: white; pointer-events: auto;">REINICIAR</button>
        </div>
        <div id="prompt">Pressione [E] para interagir</div>
    </div>

    <div id="game-info">
        <h2 style="color:#00ffff; margin-top:0">MODO GARRA</h2>
        <ul style="list-style:none; padding:0">
            <li>Setas: Mover | Espaço: Pescar | ESC: Sair</li>
        </ul>
    </div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const skyColor = 0x87CEEB;
    scene.background = new THREE.Color(skyColor);
    scene.fog = new THREE.Fog(skyColor, 10, 150);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#348C31';
    ctx.fillRect(0, 0, 256, 256);
    for(let i=0; i<5000; i++) {
        ctx.fillStyle = `rgba(0,${50+Math.random()*50},0,0.2)`;
        ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2);
    }
    const grassTexture = new THREE.CanvasTexture(canvas);
    grassTexture.wrapS = grassTexture.wrapT = THREE.RepeatWrapping;
    grassTexture.repeat.set(100, 100);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.rotation.order = 'YXZ';

    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(40, 60, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -100; sun.shadow.camera.right = 100;
    sun.shadow.camera.top = 100; sun.shadow.camera.bottom = -100;
    sun.shadow.bias = -0.0005;
    scene.add(sun);
    
    const hemiLight = new THREE.HemisphereLight(skyColor, 0x442200, 0.8); 
    scene.add(hemiLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.2)); 

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ map: grassTexture }));
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // ÁRVORES
    function createTree(x, z) {
        const group = new THREE.Group();
        const type = Math.random() > 0.5 ? 'pine' : 'round';
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 3), new THREE.MeshStandardMaterial({color: 0x4d2d18}));
        trunk.position.y = 1.5; trunk.castShadow = true; trunk.receiveShadow = true;
        group.add(trunk);
        if(type === 'pine') {
            for(let i=0; i<3; i++) {
                const f = new THREE.Mesh(new THREE.ConeGeometry(1.5 - i*0.3, 2, 8), new THREE.MeshStandardMaterial({color: 0x1a472a}));
                f.position.y = 2.5 + i*1.2; f.castShadow = true; group.add(f);
            }
        } else {
            const f = new THREE.Mesh(new THREE.DodecahedronGeometry(1.8), new THREE.MeshStandardMaterial({color: 0x2d5a27}));
            f.position.y = 4; f.castShadow = true; group.add(f);
        }
        group.position.set(x, 0, z);
        const s = 0.8 + Math.random() * 0.7;
        group.scale.set(s, s, s);
        group.rotation.y = Math.random() * Math.PI;
        scene.add(group);
    }
    for(let i=0; i<60; i++) {
        let rx = Math.random()*180-90, rz = Math.random()*180-90;
        if(Math.abs(rx) > 12 || Math.abs(rz) > 15) createTree(rx, rz);
    }

    const coins = [];
    for(let i=0; i<30; i++) {
        const c = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.02), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 }));
        c.position.set(Math.random()*80-40, 0.2, Math.random()*80-40);
        c.rotation.x = Math.PI/2; c.castShadow = true; scene.add(c); coins.push(c);
    }

    const birds = [];
    for(let i=0; i<8; i++) {
        const bird = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.4, 3), new THREE.MeshStandardMaterial({color: 0x111111}));
        bird.position.set(Math.random()*200-100, 15 + Math.random()*10, Math.random()*200-100);
        bird.rotation.x = Math.PI/2; scene.add(bird); birds.push({mesh: bird, speed: 0.1 + Math.random()*0.2});
    }

    const platforms = []; const obstacles = [];
    const platMat = new THREE.MeshStandardMaterial({color: 0x777777, roughness: 0.8});
    for(let i=0; i<15; i++) {
        const angle = i * 0.4; const radius = 10 + (i * 0.5);
        const px = Math.cos(angle) * radius + 15; const pz = Math.sin(angle) * radius - 15; const py = 1 + (i * 0.9);
        const p = new THREE.Mesh(new THREE.BoxGeometry(3, 0.4, 3), platMat);
        p.position.set(px, py, pz); p.receiveShadow = true; p.castShadow = true; scene.add(p); platforms.push(p);
        if(i > 2 && i % 3 === 0) {
            const obs = new THREE.Mesh(new THREE.BoxGeometry(0.8, 4, 0.8), new THREE.MeshStandardMaterial({color: 0xff3333}));
            obs.position.set(px, py + 2, pz); obs.castShadow = true; scene.add(obs); obstacles.push(obs);
        }
    }

    const chestGroup = new THREE.Group();
    const chestBox = new THREE.Mesh(new THREE.BoxGeometry(1, 0.7, 0.7), new THREE.MeshStandardMaterial({color: 0x3d2b1f}));
    chestBox.castShadow = true; chestGroup.add(chestBox);
    const potion = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, 0.4), new THREE.MeshStandardMaterial({color: 0x00ff00, transparent: true, opacity: 0.8, emissive: 0x003300}));
    potion.position.y = 0.5; chestGroup.add(potion);
    chestGroup.position.set(platforms[14].position.x, platforms[14].position.y + 0.6, platforms[14].position.z);
    scene.add(chestGroup);

    // MÃO E BRAÇO
    const handGroup = new THREE.Group();
    const handMesh = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.25, 0.6), new THREE.MeshStandardMaterial({color: 0xffdbac}));
    handMesh.castShadow = true;
    handGroup.add(handMesh);
    handGroup.position.set(0.6, -0.6, -1); 
    camera.add(handGroup); scene.add(camera);

    // MAQUINA
    const machine = new THREE.Group();
    const mBase = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.5, 3.5), new THREE.MeshStandardMaterial({color: 0xaa0000, metalness: 0.5}));
    mBase.castShadow = true; machine.add(mBase);
    const mGlass = new THREE.Mesh(new THREE.BoxGeometry(3.4, 4, 3.4), new THREE.MeshPhysicalMaterial({color: 0xffffff, transmission: 0.95, transparent: true, opacity: 0.2, thickness: 0.5}));
    mGlass.position.y = 2.75; machine.add(mGlass);
    const mTop = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.3, 3.6), new THREE.MeshStandardMaterial({color: 0xaa0000}));
    mTop.position.y = 4.8; machine.add(mTop);
    machine.position.set(0, 0.75, -10); scene.add(machine);
    
    const prizesInside = [];
    for(let i=0; i<10; i++) {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff }));
        p.position.set((Math.random()-0.5)*2.5, 1.5, (Math.random()-0.5)*2.5);
        p.castShadow = true; machine.add(p); prizesInside.push(p);
    }
    
    const clawSystem = new THREE.Group();
    const cable = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 4), new THREE.MeshStandardMaterial({color:0x222222})); cable.position.y = 2;
    const clawHead = new THREE.Group(); const pinchers = [];
    for(let i=0; i<3; i++) {
        const pPivot = new THREE.Group(); 
        const pMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.7, 0.1), new THREE.MeshStandardMaterial({color:0x888888}));
        pMesh.position.set(0, -0.35, 0.2); pPivot.add(pMesh); pPivot.rotation.y = (Math.PI*2/3)*i; clawHead.add(pPivot); pinchers.push(pPivot);
    }
    clawSystem.add(cable, clawHead); clawSystem.position.set(0, 5, 0); machine.add(clawSystem);

    // --- ADIÇÃO DOS NEXTBOTS COM A IMAGEM CORRIGIDA ---
    const monsterTexture = new THREE.TextureLoader().load('https://i.postimg.cc/0yfJZZrQ/menina-feia.jpg');
    const monsters = [];

    function createMonster(x, z) {
        const monster = new THREE.Mesh(
            new THREE.PlaneGeometry(2.5, 3.5), 
            new THREE.MeshBasicMaterial({ map: monsterTexture, side: THREE.DoubleSide, transparent: true })
        );
        monster.position.set(x, 1.75, z);
        monster.hp = 1;
        scene.add(monster);
        monsters.push(monster);
    }

    for(let i=0; i<15; i++) {
        let rx = (Math.random()-0.5)*150;
        let rz = (Math.random()-0.5)*150;
        if(Math.abs(rx) > 10 || Math.abs(rz) > 10) createMonster(rx, rz);
    }

    let playerName = "", totalPlayers = 1;
    let coinsCount = 0, prizesLeft = 10, gameState = "SETUP", isClawDescending = false, caughtPrize = null;
    let startTime = 0, gameActive = false, velocityY = 0, isGrounded = true, isLucky = false;
    let moveF = false, moveB = false, moveL = false, moveR = false, yaw = 0, pitch = 0, clawOpen = 1;

    let isPunching = false;
    let punchTimer = 0;

    window.resetRanking = () => { localStorage.removeItem('arcadeScores'); updateLeaderboard(); alert("Placar zerado!"); };
    window.startGame = () => {
        const nameInput = document.getElementById('player-name');
        if(nameInput.value.trim() === "") return;
        playerName = nameInput.value;
        totalPlayers = Math.min(10, parseInt(document.getElementById('total-players').value) || 1);
        document.getElementById('setup-screen').style.display = 'none';
        resetGameWorld();
        gameState = "WALK";
        updateLeaderboard();
    };
    window.prepareNextTurn = () => {
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'flex';
        document.getElementById('player-name').value = "";
    };

    function resetGameWorld() {
        camera.position.set(0, 1.7, -6); yaw = 0; pitch = 0; camera.rotation.set(0,0,0);
        coinsCount = 0; prizesLeft = 10; gameActive = false; startTime = 0;
        document.getElementById('coin-val').innerText = "0";
        document.getElementById('prizes-val').innerText = "10";
        coins.forEach(c => c.visible = true);
        prizesInside.forEach(p => { p.visible = true; p.position.y = 1.5; });
        chestGroup.visible = true; isLucky = false;
        monsters.forEach(m => { m.visible = true; m.hp = 1; });
    }

    function updateLeaderboard() {
        const scores = JSON.parse(localStorage.getItem('arcadeScores') || "[]");
        document.getElementById('score-list').innerHTML = scores.sort((a,b) => a.time - b.time).slice(0,5).map(s => `<div>${s.name}: ${s.time}s</div>`).join('');
    }

    document.addEventListener('mousedown', (e) => { 
        if(gameState === "WALK") {
            document.body.requestPointerLock();
            if(e.button === 0 && !isPunching) {
                isPunching = true; punchTimer = 0;
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                const intersects = raycaster.intersectObjects(monsters);
                if(intersects.length > 0 && intersects[0].distance < 4) {
                    const target = intersects[0].object;
                    target.hp -= 1;
                    if(target.hp <= 0) target.visible = false;
                }
            }
        }
    });

    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement && gameState === "WALK") {
            if(!gameActive) { startTime = Date.now(); gameActive = true; }
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
        }
    });

    document.addEventListener('keydown', (e) => {
        if(gameState === "WALK") {
            if(e.code === 'KeyW') moveF = true; if(e.code === 'KeyS') moveB = true; 
            if(e.code === 'KeyA') moveL = true; if(e.code === 'KeyD') moveR = true;
            if(e.code === 'Space' && isGrounded) { velocityY = 0.18; isGrounded = false; }
            if(e.code === 'KeyE') {
                coins.forEach(c => { if(c.visible && camera.position.distanceTo(c.position) < 3) { c.visible = false; coinsCount++; document.getElementById('coin-val').innerText = coinsCount; }});
                if(chestGroup.visible && camera.position.distanceTo(chestGroup.position) < 3) {
                    chestGroup.visible = false; coinsCount += 10; document.getElementById('coin-val').innerText = coinsCount;
                    isLucky = true; document.getElementById('coin-display').style.color = '#00ff00';
                    setTimeout(() => { isLucky = false; document.getElementById('coin-display').style.color = '#ffd700'; }, 30000);
                }
                if(camera.position.distanceTo(new THREE.Vector3(0,0,-10)) < 4 && coinsCount > 0) {
                    gameState = "CLAW"; document.exitPointerLock(); document.getElementById('game-info').style.display = 'block';
                    camera.position.set(0, 3.5, -6.5); camera.lookAt(0, 3.5, -10);
                }
            }
        } else if(gameState === "CLAW" && !isClawDescending) {
            if(e.code === 'ArrowLeft' && clawSystem.position.x > -1.2) clawSystem.position.x -= 0.05;
            if(e.code === 'ArrowRight' && clawSystem.position.x < 1.2) clawSystem.position.x += 0.05;
            if(e.code === 'ArrowUp' && clawSystem.position.z > -1.2) clawSystem.position.z -= 0.05;
            if(e.code === 'ArrowDown' && clawSystem.position.z < 1.2) clawSystem.position.z += 0.05;
            if(e.code === 'Space') startFishing();
            if(e.code === 'Escape') { gameState = "WALK"; document.getElementById('game-info').style.display = 'none'; camera.position.set(0, 1.7, -6); }
        }
    });

    document.addEventListener('keyup', (e) => { if(e.code === 'KeyW') moveF = false; if(e.code === 'KeyS') moveB = false; if(e.code === 'KeyA') moveL = false; if(e.code === 'KeyD') moveR = false; });

    function startFishing() {
        isClawDescending = true; let stage = "DOWN";
        const interval = setInterval(() => {
            if(stage === "DOWN") { clawOpen = 1; clawSystem.position.y -= 0.05; if(clawSystem.position.y <= 1.8) stage = "GRAB"; }
            else if(stage === "GRAB") { clawOpen -= 0.1; if(clawOpen <= 0) { prizesInside.forEach(p => { if(p.visible && p.position.distanceTo(new THREE.Vector3(clawSystem.position.x, 1.5, clawSystem.position.z)) < 0.5) caughtPrize = p; }); stage = "UP"; } }
            else if(stage === "UP") { clawSystem.position.y += 0.04; if(caughtPrize) caughtPrize.position.set(clawSystem.position.x, clawSystem.position.y - 0.5, clawSystem.position.z); if(clawSystem.position.y >= 5) stage = "DONE"; }
            else {
                if(caughtPrize) { caughtPrize.visible = false; prizesLeft -= (isLucky ? 2 : 1); coinsCount--; 
                    document.getElementById('coin-val').innerText = coinsCount; document.getElementById('prizes-val').innerText = Math.max(0, prizesLeft);
                    caughtPrize = null; if(prizesLeft <= 0) endGame();
                    else if(coinsCount <= 0) { gameState = "WALK"; document.getElementById('game-info').style.display = 'none'; camera.position.set(0, 1.7, -6); }
                }
                clawOpen = 1; clearInterval(interval); isClawDescending = false;
            }
        }, 20);
    }

    function endGame() {
        gameActive = false;
        let finalTime = ((Date.now() - startTime) / 1000).toFixed(1);
        const scores = JSON.parse(localStorage.getItem('arcadeScores') || "[]");
        scores.push({name: playerName, time: parseFloat(finalTime)});
        localStorage.setItem('arcadeScores', JSON.stringify(scores));
        updateLeaderboard();
        document.exitPointerLock();
        document.getElementById('final-stats').innerText = `${playerName} finalizou em ${finalTime}s!`;
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('game-info').style.display = 'none';
    }

    function animate() {
        requestAnimationFrame(animate); 
        
        if(isPunching) {
            punchTimer += 0.15;
            if(punchTimer < Math.PI) {
                handGroup.rotation.x = -Math.sin(punchTimer) * 1.2;
                handGroup.position.z = -1 - Math.sin(punchTimer) * 0.5;
            } else {
                isPunching = false; handGroup.rotation.x = 0; handGroup.position.z = -1;
            }
        }

        pinchers.forEach(p => p.rotation.x = 0.9 * (1 - clawOpen));
        birds.forEach(b => { b.mesh.position.z += b.speed; if(b.mesh.position.z > 150) b.mesh.position.z = -150; b.mesh.position.y += Math.sin(Date.now()*0.002)*0.02; });
        
        if(gameActive) document.getElementById('timer-val').innerText = ((Date.now() - startTime) / 1000).toFixed(1);
        
        if(gameState === "WALK") {
            velocityY -= 0.008; camera.position.y += velocityY;
            if(camera.position.y <= 1.7) { camera.position.y = 1.7; velocityY = 0; isGrounded = true; }
            platforms.forEach(p => {
                const dx = Math.abs(camera.position.x - p.position.x), dz = Math.abs(camera.position.z - p.position.z);
                if(dx < 1.8 && dz < 1.8 && camera.position.y >= p.position.y + 1.2 && camera.position.y <= p.position.y + 1.9 && velocityY <= 0) { camera.position.y = p.position.y + 1.7; velocityY = 0; isGrounded = true; }
            });
            obstacles.forEach(o => { if(camera.position.distanceTo(o.position) < 1.3) { camera.position.set(0, 1.7, -6); velocityY = 0; } });

            // MOVIMENTAÇÃO NEXTBOT
            monsters.forEach(m => {
                if(m.visible) {
                    m.lookAt(camera.position.x, 1.75, camera.position.z);
                    const dist = m.position.distanceTo(camera.position);
                    if(dist < 50) { 
                        const dir = new THREE.Vector3().subVectors(camera.position, m.position).normalize();
                        m.position.x += dir.x * 0.1; // Velocidade ajustada
                        m.position.z += dir.z * 0.1;
                    }
                    if(dist < 1.8) { camera.position.set(0, 1.7, -6); } // Teleporte de "morte"
                }
            });
            
            if(document.pointerLockElement) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
                const speed = 0.16;
                if (moveF) camera.position.addScaledVector(dir, speed); if (moveB) camera.position.addScaledVector(dir, -speed);
                if (moveL) camera.position.addScaledVector(side, speed); if (moveR) camera.position.addScaledVector(side, -speed);
                document.getElementById('prompt').style.display = (camera.position.distanceTo(new THREE.Vector3(0,0,-10)) < 4 || (chestGroup.visible && camera.position.distanceTo(chestGroup.position) < 3)) ? 'block' : 'none';
            }
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
