<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arcade Park - Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: rgba(255,255,255,0.7);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; border: 1px solid black; mix-blend-mode: difference;
        }
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 30px; box-sizing: border-box; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .stats-container { display: flex; gap: 20px; pointer-events: auto; }
        .stats {
            background: rgba(0,0,0,0.7); color: #ffd700;
            padding: 10px 20px; border-radius: 30px;
            font-size: 18px; border: 2px solid #ffd700;
        }
        #prompt {
            color: white; font-size: 24px; font-weight: bold;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 15px;
            display: none; border-bottom: 4px solid #ffd700;
        }
        #setup-screen {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        input { padding: 10px; font-size: 20px; border-radius: 5px; border: none; margin: 10px; }
        button { padding: 10px 20px; font-size: 20px; cursor: pointer; background: #ffd700; border: none; border-radius: 5px; font-weight: bold; }
        
        /* BOTÃO DE RESET ESTILIZADO */
        #reset-game-btn {
            background: #ff4444; color: white; border: 2px solid white; margin-left: 10px;
        }

        #leaderboard {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8);
            padding: 15px; border-radius: 10px; border: 1px solid #ffd700; color: #fff; font-size: 14px;
        }
        #game-info {
            position: absolute; top: 100px; right: 20px;
            background: rgba(0,0,0,0.8); color: white; padding: 20px;
            border-radius: 15px; display: none; border: 2px solid #00ffff;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: #ffd700;">ARCADE PARK CHALLENGE</h1>
        <input type="text" id="player-name" placeholder="Digite seu nome..." maxlength="15">
        <button onclick="startGame()">INICIAR JOGO</button>
    </div>

    <div id="leaderboard">
        <strong style="color: #ffd700;">RANKING:</strong>
        <div id="score-list"></div>
    </div>

    <div id="crosshair"></div>
    <div id="ui-layer">
        <div class="stats-container">
            <div class="stats">MOEDAS: <span id="coin-val">0</span></div>
            <div class="stats" style="color: #00ffcc; border-color: #00ffcc;">RESTAM: <span id="prizes-val">10</span></div>
            <div class="stats" style="color: #ff4444; border-color: #ff4444;">TEMPO: <span id="timer-val">0.0</span>s</div>
            <button id="reset-game-btn" onclick="resetCurrentMatch()">RESETAR PARTIDA</button>
            <button id="reset-btn" style="display:none" onclick="location.reload()">NOVO JOGO</button>
        </div>
        <div id="prompt">Pressione [E] para interagir</div>
    </div>

    <div id="game-info">
        <h2 style="color:#00ffff; margin-top:0">MODO GARRA</h2>
        <ul style="list-style:none; padding:0">
            <li>Setas: Mover</li>
            <li>Espaço: Pescar</li>
            <li>ESC: Sair</li>
        </ul>
    </div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    
    // CÉU
    const skyGeo = new THREE.SphereGeometry(400, 32, 15);
    const skyMat = new THREE.ShaderMaterial({ 
        vertexShader: `varying vec3 vWorldPosition; void main() { vec4 worldPosition = modelMatrix * vec4( position, 1.0 ); vWorldPosition = worldPosition.xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 ); }`, 
        fragmentShader: `uniform vec3 topColor; uniform vec3 bottomColor; varying vec3 vWorldPosition; void main() { float h = normalize( vWorldPosition ).y; gl_FragColor = vec4( mix( bottomColor, topColor, max( h, 0.0 ) ), 1.0 ); }`,
        uniforms: { topColor: { value: new THREE.Color(0x0077ff) }, bottomColor: { value: new THREE.Color(0xffffff) } },
        side: THREE.BackSide 
    });
    scene.add(new THREE.Mesh(skyGeo, skyMat));

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(50, 100, 50);
    sun.castShadow = true;
    scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));

    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(1000, 1000), 
        new THREE.MeshStandardMaterial({ color: 0x348C31, side: THREE.DoubleSide })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    // --- NOVOS LUGARES ---
    // Fonte de Água
    const fountainBase = new THREE.Mesh(new THREE.CylinderGeometry(4, 4, 0.5, 32), new THREE.MeshStandardMaterial({color: 0x888888}));
    fountainBase.position.set(30, 0.25, 20);
    scene.add(fountainBase);
    
    // Área de Descanso (Banco)
    const bench = new THREE.Mesh(new THREE.BoxGeometry(4, 0.5, 1.5), new THREE.MeshStandardMaterial({color: 0x4a2c2a}));
    bench.position.set(-20, 0.25, 15);
    scene.add(bench);

    // --- SISTEMA DE PARKOUR ---
    const parkourStartPos = new THREE.Vector3(50, 2, -30);
    const platforms = [];
    const parkourGroup = new THREE.Group();

    function createPlatform(x, y, z, w, d) {
        const geo = new THREE.BoxGeometry(w, 0.5, d);
        const mat = new THREE.MeshStandardMaterial({ color: 0xff4400 });
        const plat = new THREE.Mesh(geo, mat);
        plat.position.set(x, y, z);
        parkourGroup.add(plat);
        platforms.push(plat);
    }

    // Caminho do Parkour
    createPlatform(50, 2, -30, 4, 4); // Início
    createPlatform(55, 3.5, -30, 2, 2);
    createPlatform(60, 5, -30, 2, 2); // Obstáculo (altura)
    createPlatform(60, 5, -35, 2, 2);
    createPlatform(55, 6.5, -40, 2, 2);
    createPlatform(50, 8, -45, 5, 5); // Fim do Parkour
    scene.add(parkourGroup);

    // Moedas do Final do Parkour (5 moedas)
    const finalCoins = [];
    let finalCoinsCollected = false;
    for(let i=0; i<5; i++) {
        const c = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.05), new THREE.MeshStandardMaterial({ color: 0x00ff00, metalness: 0.9 }));
        c.position.set(48 + i, 8.5, -45);
        c.rotation.x = Math.PI/2;
        scene.add(c);
        finalCoins.push(c);
    }

    // Árvores
    for(let i=0; i<50; i++) {
        const x = Math.random() * 160 - 80, z = Math.random() * 160 - 80;
        if (Math.abs(x) > 10 || Math.abs(z) > 15) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 4), new THREE.MeshStandardMaterial({color:0x5D4037}));
            trunk.position.y = 2;
            tree.add(trunk);
            const foliage = new THREE.Mesh(new THREE.DodecahedronGeometry(2), new THREE.MeshStandardMaterial({color:0x2E7D32}));
            foliage.position.y = 4.5;
            tree.add(foliage);
            tree.position.set(x, 0, z);
            scene.add(tree);
        }
    }

    // Moedas iniciais
    const coins = [];
    for(let i=0; i<30; i++) {
        const c = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.015), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9 }));
        c.position.set(Math.random()*80-40, 0.1, Math.random()*80-40);
        c.rotation.x = Math.PI/2;
        scene.add(c);
        coins.push(c);
    }

    // MÃO
    const handGroup = new THREE.Group();
    const palm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.08, 0.35), new THREE.MeshStandardMaterial({color: 0xffdbac}));
    const heldCoin = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.015), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9 }));
    heldCoin.position.set(0, 0.08, 0); heldCoin.visible = false;
    handGroup.add(palm, heldCoin);
    handGroup.position.set(0.6, -0.6, -1);
    camera.add(handGroup);
    scene.add(camera);

    // MÁQUINA
    const machine = new THREE.Group();
    const frameMat = new THREE.MeshStandardMaterial({color: 0xcc0000, metalness: 0.5});
    const base = new THREE.Mesh(new THREE.BoxGeometry(3.2, 1.2, 3.2), frameMat);
    base.position.y = 0.6;
    machine.add(base);

    const controlPanel = new THREE.Mesh(new THREE.BoxGeometry(2, 0.4, 0.6), new THREE.MeshStandardMaterial({color: 0x222222}));
    controlPanel.position.set(0, 1.1, 1.6);
    machine.add(controlPanel);

    const glass = new THREE.Mesh(new THREE.BoxGeometry(3, 3.5, 3), new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.15}));
    glass.position.y = 2.8;
    machine.add(glass);

    const prizesInside = [];
    const prizeTotal = 10;
    for(let i=0; i<prizeTotal; i++) {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.22), new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff }));
        p.position.set((Math.random()-0.5)*2.4, 1.3, (Math.random()-0.5)*2.4);
        machine.add(p);
        prizesInside.push(p);
    }

    const clawSystem = new THREE.Group();
    const cable = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 3), new THREE.MeshStandardMaterial({color:0x333333}));
    cable.position.y = 1.5;
    const clawHead = new THREE.Group();
    const pinchers = [];
    for(let i=0; i<3; i++) {
        const pPivot = new THREE.Group();
        const pMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.6, 0.05), new THREE.MeshStandardMaterial({color:0xcccccc}));
        pMesh.position.y = -0.3; pMesh.position.z = 0.15;
        pPivot.add(pMesh); pPivot.rotation.y = (Math.PI*2/3)*i;
        clawHead.add(pPivot); pinchers.push(pPivot);
    }
    clawSystem.add(cable, clawHead);
    clawSystem.position.set(0, 4.5, 0);
    machine.add(clawSystem);
    machine.position.set(0, 0, -10);
    scene.add(machine);

    // LÓGICA
    let playerName = "";
    let coinsCount = 0, prizesLeft = prizeTotal;
    let gameState = "SETUP", isClawDescending = false, caughtPrize = null;
    let startTime = 0, gameActive = false;
    let moveF = false, moveB = false, moveL = false, moveR = false;
    let yaw = 0, pitch = 0, clawOpen = 1;

    window.startGame = () => {
        const input = document.getElementById('player-name');
        if(input.value.trim() === "") return alert("Insira seu nome!");
        playerName = input.value;
        document.getElementById('setup-screen').style.display = 'none';
        gameState = "WALK";
        updateLeaderboard();
    };

    // FUNÇÃO RESETAR PARTIDA (Conforme pedido)
    window.resetCurrentMatch = () => {
        camera.position.set(0, 1.7, 0);
        camera.lookAt(0, 1.7, -10);
        startTime = Date.now();
        finalCoinsCollected = false;
        finalCoins.forEach(c => c.visible = true);
        // Placar (CoinsCount) e Leaderboard continuam normais
    };

    function updateLeaderboard() {
        const scores = JSON.parse(localStorage.getItem('arcadeScores') || "[]");
        document.getElementById('score-list').innerHTML = scores
            .sort((a,b) => a.time - b.time).slice(0,5)
            .map(s => `<div>${s.name}: ${s.time}s</div>`).join('');
    }

    function collectCoinAnim() {
        heldCoin.visible = true;
        let t = 0;
        const anim = setInterval(() => {
            t += 0.1; handGroup.position.y = -0.6 + Math.sin(t * Math.PI) * 0.4;
            if(t >= 1) { clearInterval(anim); heldCoin.visible = false; handGroup.position.y = -0.6; }
        }, 30);
    }

    document.addEventListener('mousedown', () => { if(gameState === "WALK") document.body.requestPointerLock(); });
    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement && gameState === "WALK") {
            if(!gameActive) { startTime = Date.now(); gameActive = true; }
            yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
        }
    });

    document.addEventListener('keydown', (e) => {
        if(gameState === "WALK") {
            if(e.code === 'KeyW') moveF = true; if(e.code === 'KeyS') moveB = true; 
            if(e.code === 'KeyA') moveL = true; if(e.code === 'KeyD') moveR = true;
            if(e.code === 'KeyE') {
                // Coleta moedas normais
                coins.forEach(c => { if(c.visible && camera.position.distanceTo(c.position) < 3) { 
                    c.visible = false; coinsCount++; 
                    document.getElementById('coin-val').innerText = coinsCount;
                    collectCoinAnim();
                }});
                
                // Coleta moedas do final do Parkour (SÓ UMA VEZ)
                if(!finalCoinsCollected) {
                    let collectedAny = false;
                    finalCoins.forEach(c => {
                        if(camera.position.distanceTo(c.position) < 3) {
                            c.visible = false;
                            collectedAny = true;
                        }
                    });
                    if(collectedAny) {
                        coinsCount += 5;
                        finalCoinsCollected = true;
                        document.getElementById('coin-val').innerText = coinsCount;
                        collectCoinAnim();
                    }
                }

                if(camera.position.distanceTo(machine.position) < 4) {
                    if(coinsCount > 0) {
                        gameState = "CLAW";
                        document.exitPointerLock(); 
                        document.getElementById('game-info').style.display = 'block';
                        camera.position.set(0, 3.4, -6.5); camera.lookAt(0, 3.4, -10);
                    } else {
                        alert("Você precisa de moedas!");
                    }
                }
            }
        } else if(gameState === "CLAW" && !isClawDescending) {
            if(e.code === 'ArrowLeft' && clawSystem.position.x > -1.2) clawSystem.position.x -= 0.03;
            if(e.code === 'ArrowRight' && clawSystem.position.x < 1.2) clawSystem.position.x += 0.03;
            if(e.code === 'ArrowUp' && clawSystem.position.z > -1.2) clawSystem.position.z -= 0.03;
            if(e.code === 'ArrowDown' && clawSystem.position.z < 1.2) clawSystem.position.z += 0.03;
            if(e.code === 'Space') startFishing();
            if(e.code === 'Escape') { gameState = "WALK"; document.getElementById('game-info').style.display = 'none'; camera.position.set(0, 1.7, -6); }
        }
    });

    function startFishing() {
        isClawDescending = true;
        let stage = "DOWN";
        const interval = setInterval(() => {
            if(stage === "DOWN") {
                clawOpen = 1; clawSystem.position.y -= 0.04;
                if(clawSystem.position.y <= 1.75) stage = "GRAB";
            } else if(stage === "GRAB") {
                clawOpen -= 0.1;
                if(clawOpen <= 0) {
                    prizesInside.forEach(p => {
                        if(p.visible && p.position.distanceTo(new THREE.Vector3(clawSystem.position.x, 1.3, clawSystem.position.z)) < 0.45) {
                            caughtPrize = p;
                        }
                    });
                    stage = "UP";
                }
            } else if(stage === "UP") {
                clawSystem.position.y += 0.03;
                if(caughtPrize) caughtPrize.position.set(clawSystem.position.x, clawSystem.position.y - 0.4, clawSystem.position.z);
                if(clawSystem.position.y >= 4.5) stage = "DONE";
            } else {
                if(caughtPrize) { 
                    caughtPrize.visible = false; 
                    prizesLeft--;
                    coinsCount--; 
                    document.getElementById('coin-val').innerText = coinsCount;
                    document.getElementById('prizes-val').innerText = prizesLeft;
                    caughtPrize = null;
                    if(prizesLeft <= 0) endGame();
                    else if(coinsCount <= 0) { 
                        gameState = "WALK"; document.getElementById('game-info').style.display = 'none'; camera.position.set(0, 1.7, -6);
                    }
                }
                clawOpen = 1; clearInterval(interval); isClawDescending = false;
            }
        }, 20);
    }

    function endGame() {
        gameActive = false;
        let finalTime = ((Date.now() - startTime) / 1000).toFixed(1);
        const scores = JSON.parse(localStorage.getItem('arcadeScores') || "[]");
        scores.push({name: playerName, time: parseFloat(finalTime)});
        localStorage.setItem('arcadeScores', JSON.stringify(scores));
        alert(`PARABÉNS ${playerName}! Tempo: ${finalTime}s`);
        document.getElementById('reset-btn').style.display = 'block';
        updateLeaderboard();
    }

    document.addEventListener('keyup', () => { moveF = moveB = moveL = moveR = false; });

    function animate() {
        requestAnimationFrame(animate);
        pinchers.forEach(p => p.rotation.x = 0.8 * (1 - clawOpen));
        
        // SISTEMA DE QUEDA DO PARKOUR
        if(camera.position.x > 45 && camera.position.y > 0.5) {
             if(camera.position.y < 1.5) { // Caiu da plataforma
                camera.position.copy(parkourStartPos);
             }
        }

        if(gameActive) document.getElementById('timer-val').innerText = ((Date.now() - startTime) / 1000).toFixed(1);
        if(gameState === "WALK" && document.pointerLockElement) {
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
            if (moveF) camera.position.addScaledVector(dir, 0.15); if (moveB) camera.position.addScaledVector(dir, -0.15);
            if (moveL) camera.position.addScaledVector(side, 0.15); if (moveR) camera.position.addScaledVector(side, -0.15);
            document.getElementById('prompt').style.display = (camera.position.distanceTo(machine.position) < 4) ? 'block' : 'none';
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
