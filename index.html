<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arcade Park - Realistic Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: rgba(255,255,255,0.7);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; border: 1px solid black; mix-blend-mode: difference;
        }
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 30px; box-sizing: border-box; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .stats-container { display: flex; gap: 20px; }
        .stats {
            background: rgba(0,0,0,0.7); color: #ffd700;
            padding: 15px 30px; border-radius: 30px;
            font-size: 22px; border: 2px solid #ffd700;
        }
        #prompt {
            color: white; font-size: 24px; font-weight: bold;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 15px;
            display: none; border-bottom: 4px solid #ffd700;
        }
        #game-info {
            position: absolute; top: 100px; right: 20px;
            background: rgba(0,0,0,0.8); color: white; padding: 20px;
            border-radius: 15px; display: none; border: 2px solid #00ffff;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui-layer">
        <div class="stats-container">
            <div class="stats">MOEDAS: <span id="coin-val">0</span></div>
            <div class="stats" style="color: #00ffcc; border-color: #00ffcc;">PRÊMIOS: <span id="prizes-val">0</span></div>
        </div>
        <div id="prompt">Pressione [E] para interagir</div>
    </div>

    <div id="game-info">
        <h2 style="color:#00ffff; margin-top:0">MODO GARRA</h2>
        <ul style="list-style:none; padding:0">
            <li>Setas: Mover</li>
            <li>Espaço: Pescar</li>
            <li>ESC: Sair</li>
        </ul>
    </div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    
    // CÉU MAIS REALISTA (GRADIENTE)
    const vertexShader = `
        varying vec3 vWorldPosition;
        void main() {
            vec4 worldPosition = modelMatrix * vec4( position, 1.0 );
            vWorldPosition = worldPosition.xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
        }
    `;
    const fragmentShader = `
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        varying vec3 vWorldPosition;
        void main() {
            float h = normalize( vWorldPosition ).y;
            gl_FragColor = vec4( mix( bottomColor, topColor, max( h, 0.0 ) ), 1.0 );
        }
    `;
    const skyGeo = new THREE.SphereGeometry(400, 32, 15);
    const skyMat = new THREE.ShaderMaterial({ 
        vertexShader, fragmentShader, 
        uniforms: { topColor: { value: new THREE.Color(0x0077ff) }, bottomColor: { value: new THREE.Color(0xffffff) } },
        side: THREE.BackSide 
    });
    scene.add(new THREE.Mesh(skyGeo, skyMat));

    scene.fog = new THREE.FogExp2(0x89b1c4, 0.005);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // LUZES
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(50, 100, 50);
    sun.castShadow = true;
    sun.shadow.camera.left = -50; sun.shadow.camera.right = 50;
    sun.shadow.camera.top = 50; sun.shadow.camera.bottom = -50;
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    // CHÃO REALISTA
    const groundGeo = new THREE.PlaneGeometry(500, 500);
    const groundMat = new THREE.MeshStandardMaterial({ 
        color: 0x348C31, 
        roughness: 0.8,
        metalness: 0.1
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // ÁRVORES MAIS REALISTAS
    function createTree(x, z) {
        const tree = new THREE.Group();
        // Tronco
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 4, 8), new THREE.MeshStandardMaterial({color:0x5D4037}));
        trunk.position.y = 2;
        trunk.castShadow = true;
        // Folhagem composta
        for(let i=0; i<5; i++) {
            const leaf = new THREE.Mesh(new THREE.DodecahedronGeometry(1.5 + Math.random()), new THREE.MeshStandardMaterial({color:0x2E7D32}));
            leaf.position.set(Math.random()-0.5, 4 + Math.random()*2, Math.random()-0.5);
            leaf.castShadow = true;
            tree.add(leaf);
        }
        tree.add(trunk);
        tree.position.set(x, 0, z);
        scene.add(tree);
    }
    for(let i=0; i<50; i++) {
        const x = Math.random() * 160 - 80, z = Math.random() * 160 - 80;
        if (Math.abs(x) > 10 || Math.abs(z) > 15) createTree(x, z);
    }

    // MOEDAS (MENORES)
    let coinsCount = 0, prizesCollected = 0;
    const coins = [];
    for(let i=0; i<20; i++) {
        const c = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.02), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9, roughness: 0.1 }));
        c.position.set(Math.random()*60-30, 0.08, Math.random()*60-30);
        c.rotation.x = Math.PI/2;
        c.castShadow = true;
        scene.add(c);
        coins.push(c);
    }

    // MÃO DO JOGADOR (PARA PEGAR MOEDAS)
    const handGroup = new THREE.Group();
    const palm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.3), new THREE.MeshStandardMaterial({color: 0xffdbac}));
    handGroup.add(palm);
    handGroup.position.set(0.5, -0.5, -0.8);
    camera.add(handGroup);
    scene.add(camera);
    handGroup.visible = false;

    // MÁQUINA DE PRÊMIOS MELHORADA
    const machine = new THREE.Group();
    const frameMat = new THREE.MeshStandardMaterial({color: 0xcc0000, metalness: 0.5, roughness: 0.2});
    
    const base = new THREE.Mesh(new THREE.BoxGeometry(3.2, 1.2, 3.2), frameMat);
    base.position.y = 0.6;
    base.castShadow = true;
    machine.add(base);

    // Painel de Controle (Enfeite)
    const panel = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 0.6), new THREE.MeshStandardMaterial({color: 0x222222}));
    panel.position.set(0, 1.1, 1.6);
    machine.add(panel);

    // Alavanca (Joystick Decorativo)
    const joystickBase = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshStandardMaterial({color: 0x000000}));
    joystickBase.position.set(-0.5, 1.4, 1.6);
    const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4), new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
    stick.position.y = 0.2; stick.rotation.x = 0.3;
    joystickBase.add(stick);
    const ball = new THREE.Mesh(new THREE.SphereGeometry(0.06), new THREE.MeshStandardMaterial({color: 0xff0000}));
    ball.position.y = 0.4;
    stick.add(ball);
    machine.add(joystickBase);

    // Botão (Decorativo)
    const btnBase = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05), new THREE.MeshStandardMaterial({color: 0x111111}));
    btnBase.position.set(0.5, 1.35, 1.6);
    const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.08), new THREE.MeshStandardMaterial({color: 0x00ff00}));
    btn.position.y = 0.05;
    btnBase.add(btn);
    machine.add(btnBase);

    const top = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.6, 3.2), frameMat);
    top.position.y = 4.8;
    machine.add(top);

    const glassMat = new THREE.MeshStandardMaterial({color: 0x88ccff, transparent: true, opacity: 0.2, roughness: 0});
    const glassMain = new THREE.Mesh(new THREE.BoxGeometry(3, 3.5, 3), glassMat);
    glassMain.position.y = 2.8;
    machine.add(glassMain);

    const prizesInside = [];
    for(let i=0; i<30; i++) {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.22), new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff, roughness: 0.3 }));
        p.position.set((Math.random()-0.5)*2.5, 1.3, (Math.random()-0.5)*2.5);
        p.castShadow = true;
        machine.add(p);
        prizesInside.push(p);
    }

    // GARRA
    const clawSystem = new THREE.Group();
    const cable = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 3), new THREE.MeshStandardMaterial({color:0x333333}));
    cable.position.y = 1.5;
    const clawHeadGroup = new THREE.Group();
    const clawBase = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.2), new THREE.MeshStandardMaterial({color:0xffcc00, metalness: 0.8}));
    clawHeadGroup.add(clawBase);
    const pinchers = [];
    for(let i=0; i<3; i++) {
        const pPivot = new THREE.Group();
        const pMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.08), new THREE.MeshStandardMaterial({color:0xdddddd, metalness: 0.9}));
        pMesh.position.y = -0.3; pMesh.position.z = 0.2;
        pPivot.add(pMesh);
        pPivot.rotation.y = (Math.PI*2/3)*i;
        clawHeadGroup.add(pPivot);
        pinchers.push(pPivot);
    }
    clawSystem.add(cable, clawHeadGroup);
    clawSystem.position.set(0, 4.5, 0);
    machine.add(clawSystem);
    machine.position.set(0, 0, -10);
    scene.add(machine);

    // LÓGICA
    let gameState = "WALK", isClawDescending = false, caughtPrize = null;
    let moveF = false, moveB = false, moveL = false, moveR = false;
    let yaw = 0, pitch = 0, clawOpen = 1;

    document.addEventListener('mousedown', () => { if(gameState === "WALK") document.body.requestPointerLock(); });
    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement && gameState === "WALK") {
            yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
        }
    });

    function playHandAnimation() {
        handGroup.visible = true;
        handGroup.position.y = -0.8;
        let t = 0;
        const anim = setInterval(() => {
            t += 0.1;
            handGroup.position.y = -0.8 + Math.sin(t*Math.PI) * 0.3;
            handGroup.position.z = -0.8 - Math.sin(t*Math.PI) * 0.2;
            if(t >= 1) { clearInterval(anim); handGroup.visible = false; }
        }, 30);
    }

    document.addEventListener('keydown', (e) => {
        if(gameState === "WALK") {
            if(e.code === 'KeyW') moveF = true; if(e.code === 'KeyS') moveB = true; 
            if(e.code === 'KeyA') moveL = true; if(e.code === 'KeyD') moveR = true;
            if(e.code === 'KeyE') {
                coins.forEach(c => { 
                    if(c.visible && camera.position.distanceTo(c.position) < 3) { 
                        c.visible = false; 
                        coinsCount++; 
                        document.getElementById('coin-val').innerText = coinsCount;
                        playHandAnimation();
                    } 
                });
                if(camera.position.distanceTo(machine.position) < 4 && coinsCount > 0) {
                    gameState = "CLAW"; coinsCount--; document.getElementById('coin-val').innerText = coinsCount;
                    document.exitPointerLock(); document.getElementById('game-info').style.display = 'block';
                    camera.position.set(0, 3.4, -6.5); camera.lookAt(0, 3.4, -10);
                }
            }
        } else if(gameState === "CLAW" && !isClawDescending) {
            if(e.code === 'ArrowLeft' && clawSystem.position.x > -1.2) clawSystem.position.x -= 0.05;
            if(e.code === 'ArrowRight' && clawSystem.position.x < 1.2) clawSystem.position.x += 0.05;
            if(e.code === 'ArrowUp' && clawSystem.position.z > -1.2) clawSystem.position.z -= 0.05;
            if(e.code === 'ArrowDown' && clawSystem.position.z < 1.2) clawSystem.position.z += 0.05;
            if(e.code === 'Space') startFishing();
            if(e.code === 'Escape') { gameState = "WALK"; document.getElementById('game-info').style.display = 'none'; camera.position.set(0, 1.7, -6); }
        }
    });

    function startFishing() {
        isClawDescending = true;
        let stage = "DOWN";
        const interval = setInterval(() => {
            if(stage === "DOWN") {
                clawOpen = 1; clawSystem.position.y -= 0.06;
                if(clawSystem.position.y <= 1.7) stage = "GRAB";
            } else if(stage === "GRAB") {
                clawOpen -= 0.15;
                if(clawOpen <= 0) {
                    clawOpen = 0;
                    prizesInside.forEach(p => {
                        if(p.visible && p.position.distanceTo(new THREE.Vector3(clawSystem.position.x, 1.25, clawSystem.position.z)) < 0.8) {
                            caughtPrize = p;
                        }
                    });
                    stage = "UP";
                }
            } else if(stage === "UP") {
                clawSystem.position.y += 0.04;
                if(caughtPrize) {
                    caughtPrize.position.x = clawSystem.position.x;
                    caughtPrize.position.z = clawSystem.position.z;
                    caughtPrize.position.y = clawSystem.position.y - 0.4;
                }
                if(clawSystem.position.y >= 4.5) stage = "DONE";
            } else {
                if(caughtPrize) { 
                    caughtPrize.visible = false; 
                    prizesCollected++; 
                    document.getElementById('prizes-val').innerText = prizesCollected; 
                    caughtPrize = null; 
                    alert("VOCÊ PEGOU UM PRÊMIO!");
                }
                clawOpen = 1; clearInterval(interval); isClawDescending = false;
            }
        }, 20);
    }

    document.addEventListener('keyup', (e) => { moveF = moveB = moveL = moveR = false; });
    camera.position.set(0, 1.7, 10);

    function animate() {
        requestAnimationFrame(animate);
        pinchers.forEach(p => p.rotation.x = 0.8 * (1 - clawOpen));
        
        // Rotação suave das moedas
        coins.forEach(c => { if(c.visible) c.rotation.z += 0.02; });

        if(gameState === "WALK" && document.pointerLockElement) {
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
            if (moveF) camera.position.addScaledVector(dir, 0.15); if (moveB) camera.position.addScaledVector(dir, -0.15);
            if (moveL) camera.position.addScaledVector(side, 0.15); if (moveR) camera.position.addScaledVector(side, -0.15);
            document.getElementById('prompt').style.display = (camera.position.distanceTo(machine.position) < 4) ? 'block' : 'none';
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
